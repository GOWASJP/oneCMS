name: Release

# v* タグ（例: v0.9.0）を push すると、自動でビルドして
# build/onecms.html を GitHub Release に添付する。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build single-file (build/onecms.html)
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ONE CMS ${{ github.ref_name }}
          files: build/onecms.html
          generate_release_notes: true
