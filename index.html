                    <div class="mb-3 pb-3 border-b border-[var(--ds-border-default)]">
                      <h2 class="text-sm font-bold text-[var(--ds-text-heading)]">テーマ開発</h2>
                      <p class="text-[11px] text-[var(--ds-text-muted)] mt-1 leading-snug">
                        編集中:
                        <span
                          class="font-medium"
                          x-text="activeThemeManifest?.name || activeThemeId"
                        ></span>
                        <span class="font-mono">
                          （themes/
                          <span x-text="activeThemeId"></span>
                          /）
                        </span>
                      </p>
                      <p class="text-[10px] text-[var(--ds-text-muted)] mt-1 leading-snug">
                        現在のテーマの Handlebars
                        テンプレートを直接編集します。右の「テーマの構成と作り方」「ページ種別ごとの変数」やヘルパ一覧を参照しながら組み立ててください。
                      </p>
                    </div>
                    <template x-if="templateUpdates.length">
                      <button
                        @click="showTemplateUpdates = true"
                        class="w-full mb-3 flex items-center gap-2 px-2.5 py-2 rounded-md border border-[var(--ds-primary-600)]/40 bg-[var(--ds-primary-600)]/5 text-[var(--ds-primary-600)] text-xs font-medium hover:bg-[var(--ds-primary-600)]/10 transition-all"
                      >
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 shrink-0"></i>
                        <span>
                          <span x-text="templateUpdates.length"></span>
                          件のテンプレート更新
                        </span>
                      </button>
                    </template>
                    <h3
                      class="text-xs font-bold text-[var(--ds-text-muted)] uppercase tracking-wider mb-2"
                    >
                      テンプレート
                    </h3>
                    <div class="space-y-0.5">
                      <template
                        x-for="f in templateFiles.filter(f => !f.isComponent)"
                        :key="f.path"
                      >
                        <button
                          @click="openTemplateFile(f.path)"
                          :class="currentTemplateFile === f.path ? 'bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] font-medium' : 'text-[var(--ds-text-body)] hover:bg-[var(--ds-bg-hover)]'"
                          class="block w-full text-left px-2.5 py-2 rounded"
                        >
                          <span
                            class="block text-xs font-mono font-medium truncate leading-tight"
                            x-text="f.name"
                          ></span>
                          <template x-if="templateDescription(f.name)">
                            <span
                              class="block text-[10px] text-[var(--ds-text-muted)] truncate mt-1 leading-tight"
                              x-text="templateDescription(f.name)"
                            ></span>
                          </template>
                        </button>
                      </template>
                    </div>
                    <template x-if="templateFiles.some(f => f.isComponent)">
                      <div class="mt-4">
                        <h3
                          class="text-xs font-bold text-[var(--ds-text-muted)] uppercase tracking-wider mb-2"
                        >
                          コンポーネント
                        </h3>
                        <p class="text-[10px] text-[var(--ds-text-muted)] mb-2 leading-snug">
                          {{> name}} で他のテンプレートから呼び出せる再利用パーシャル
                        </p>
                        <div class="space-y-0.5">
                          <template
                            x-for="f in templateFiles.filter(f => f.isComponent)"
                            :key="f.path"
                          >
                            <button
                              @click="openTemplateFile(f.path)"
                              :class="currentTemplateFile === f.path ? 'bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] font-medium' : 'text-[var(--ds-text-body)] hover:bg-[var(--ds-bg-hover)]'"
                              class="block w-full text-left px-2 py-1.5 rounded"
                            >
                              <span class="block text-xs font-mono truncate" x-text="f.name"></span>
                              <template x-if="templateDescription(f.name)">
                                <span
                                  class="block text-[10px] text-[var(--ds-text-muted)] truncate mt-0.5"
                                  x-text="templateDescription(f.name)"
                                ></span>
                              </template>
                            </button>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- 中央: コードエディタ -->
                <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
                  <template x-if="currentTemplateFile">
                    <div class="flex-1 flex flex-col">
                      <div class="gh-editor-header px-4">
                        <span
                          class="text-sm font-mono font-medium text-[var(--ds-text-heading)]"
                          x-text="currentTemplateFile"
                        ></span>
                        <div class="flex-1"></div>
                        <!-- サンプル挿入 -->
                        <template x-if="contentTypes.length">
                          <div class="relative" x-data="{ showSampleMenu: false }">
                            <button
                              @click="showSampleMenu = !showSampleMenu"
                              class="gh-btn-outline text-xs"
                            >
                              <i data-lucide="code" class="w-3 h-3"></i>
                              サンプル挿入
                            </button>
                            <div
                              x-show="showSampleMenu"
                              @click.outside="showSampleMenu = false"
                              class="absolute right-0 top-full mt-1 bg-[var(--ds-bg-surface)] border border-[var(--ds-border-default)] rounded-md shadow-lg py-1 z-20 min-w-[160px]"
                            >
                              <template x-for="type in contentTypes" :key="type.id">
                                <button
                                  @click="
                                    const ta = document.getElementById('template-editor');
                                    const pos = ta.selectionStart;
                                    const before = templateCode.substring(0, pos);
                                    const after = templateCode.substring(pos);
                                    const sample = getFieldTemplateCode(type);
                                    templateCode = before + sample + after;
                                    showSampleMenu = false;
                                    $nextTick(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = pos + sample.length });
                                  "
                                  class="block w-full text-left px-3 py-1.5 text-xs hover:bg-[var(--ds-bg-hover)]"
                                  x-text="type.label"
                                ></button>
                              </template>
                            </div>
                          </div>
                        </template>
                        <button @click="saveTemplateFile()" class="gh-btn-green text-[13px]">
                          保存
                        </button>
                      </div>
                      <textarea
                        id="template-editor"
                        x-model="templateCode"
                        class="flex-1 w-full p-4 font-mono text-sm leading-relaxed resize-none border-0 outline-none bg-[var(--ds-bg-muted)] text-[var(--ds-text-heading)]"
                        spellcheck="false"
                        @keydown.ctrl.s.prevent="saveTemplateFile()"
                        @keydown.meta.s.prevent="saveTemplateFile()"
                      ></textarea>
                    </div>
                  </template>
                  <template x-if="!currentTemplateFile">
                    <div class="flex-1 flex items-center justify-center">
                      <p class="text-sm text-[var(--ds-text-muted)]">
                        左のファイル一覧からテンプレートを選択
                      </p>
                    </div>
                  </template>
                </div>

                <!-- リサイズハンドル（ドラッグでリファレンス幅を調整） -->
                <div
                  role="separator"
                  aria-orientation="vertical"
                  title="ドラッグで幅を調整"
                  class="w-1 shrink-0 cursor-col-resize bg-[var(--ds-border-default)] hover:bg-[var(--ds-primary-400)] transition-colors"
                  @mousedown.prevent="
                    const startX = $event.clientX; const startW = refWidth;
                    const move = (ev) => { refWidth = Math.min(720, Math.max(240, startW + (startX - ev.clientX))); };
                    const up = () => {
                      window.removeEventListener('mousemove', move);
                      window.removeEventListener('mouseup', up);
                      document.body.style.userSelect = '';
                      localStorage.setItem('cms-ref-width', refWidth);
                    };
                    window.addEventListener('mousemove', move);
                    window.addEventListener('mouseup', up);
                    document.body.style.userSelect = 'none';
                  "
                ></div>

                <!-- 右: リファレンスパネル -->
                <aside
                  class="shrink-0 border-l border-[var(--ds-border-default)] overflow-y-auto bg-[var(--ds-bg-muted)]"
                  :style="'width:' + refWidth + 'px'"
                >
                  <div class="p-3">
                    <h3
                      class="text-xs font-bold text-[var(--ds-text-muted)] uppercase tracking-wider mb-3 flex items-center gap-1.5"
                    >
                      <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
                      リファレンス
                    </h3>
                    <p class="text-[10px] text-[var(--ds-text-muted)] mb-3 leading-snug">
                      クリックでクリップボードにコピー、または編集中ファイルのカーソル位置に挿入できます。
                    </p>

                    <!-- 各セクション（カテゴリ別） -->
                    <template x-for="group in templateReferenceGroups" :key="group.id">
                      <div class="mb-2">
                        <button
                          @click="templateRefOpenSection[group.id] = !templateRefOpenSection[group.id]"
                          class="w-full flex items-center justify-between px-2 py-1.5 text-xs font-bold text-[var(--ds-text-heading)] hover:bg-[var(--ds-bg-hover)] rounded"
                        >
                          <span x-text="group.label"></span>
                          <i
                            data-lucide="chevron-down"
                            class="w-3 h-3 transition-transform"
                            :class="templateRefOpenSection[group.id] ? '' : '-rotate-90'"
                          ></i>
                        </button>
                        <div
                          x-show="templateRefOpenSection[group.id]"
                          class="mt-1 space-y-1.5 pl-1"
                        >
                          <template x-for="item in group.items" :key="item.label">
                            <div>
                              <p
                                class="text-[10px] text-[var(--ds-text-muted)] mb-0.5 px-1"
                                x-text="item.label"
                              ></p>
                              <div
                                class="bg-[var(--ds-bg-surface)] border border-[var(--ds-border-default)] rounded p-2 cursor-pointer relative group hover:border-[var(--ds-primary-600)] overflow-x-auto"
                                @click="
                                  const ta = document.getElementById('template-editor');
                                  if (ta && currentTemplateFile) {
                                    const pos = ta.selectionStart;
                                    templateCode = templateCode.substring(0, pos) + item.code + templateCode.substring(pos);
                                    $nextTick(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = pos + item.code.length });
                                    showToast('カーソル位置に挿入しました');
                                  } else {
                                    navigator.clipboard.writeText(item.code);
                                    showToast('コピーしました');
                                  }
                                "
                              >
                                <pre
                                  class="font-mono text-[10px] text-[var(--ds-text-heading)] m-0 whitespace-pre"
                                  x-text="item.code"
                                ></pre>
                              </div>
                              <template x-if="item.note">
                                <p
                                  class="text-[10px] text-[var(--ds-text-muted)] mt-0.5 px-1 leading-snug"
                                  x-text="item.note"
                                ></p>
                              </template>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>

                    <!-- 投稿タイプ別フィールド（動的） -->
                    <div class="mb-2">
                      <button
                        @click="templateRefOpenSection['types'] = !templateRefOpenSection['types']"
                        class="w-full flex items-center justify-between px-2 py-1.5 text-xs font-bold text-[var(--ds-text-heading)] hover:bg-[var(--ds-bg-hover)] rounded"
                      >
                        <span>投稿タイプ別フィールド</span>
                        <i
                          data-lucide="chevron-down"
                          class="w-3 h-3 transition-transform"
                          :class="templateRefOpenSection['types'] ? '' : '-rotate-90'"
                        ></i>
                      </button>
                      <div x-show="templateRefOpenSection['types']" class="mt-1 space-y-1.5 pl-1">
                        <select
                          x-model="templateRefSelectedTypeId"
                          class="gh-select-light text-xs w-full mb-2"
                        >
                          <option value="">タイプを選択...</option>
                          <template x-for="type in contentTypes" :key="type.id">
                            <option :value="type.id" x-text="type.label"></option>
                          </template>
                        </select>
                        <template x-if="templateRefSelectedTypeId">
                          <p
                            class="text-[10px] text-[var(--ds-primary-600)] font-semibold px-1 mb-2"
                            x-text="(contentTypes.find(t => t.id === templateRefSelectedTypeId)?.label || '') + ' (' + templateRefTypeFields().length + '項目)'"
                          ></p>
                        </template>
                        <template x-if="templateRefSelectedTypeId">
                          <div class="space-y-1.5">
                            <template x-for="item in templateRefTypeFields()" :key="item.label">
                              <div>
                                <p
                                  class="text-[10px] text-[var(--ds-text-muted)] mb-0.5 px-1"
                                  x-text="item.label"
                                ></p>
                                <div
                                  class="bg-[var(--ds-bg-surface)] border border-[var(--ds-border-default)] rounded p-2 cursor-pointer relative group hover:border-[var(--ds-primary-600)] overflow-x-auto"
                                  @click="
                                    const ta = document.getElementById('template-editor');
                                    if (ta && currentTemplateFile) {
                                      const pos = ta.selectionStart;
                                      templateCode = templateCode.substring(0, pos) + item.code + templateCode.substring(pos);
                                      $nextTick(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = pos + item.code.length });
                                      showToast('カーソル位置に挿入しました');
                                    } else {
                                      navigator.clipboard.writeText(item.code);
                                      showToast('コピーしました');
                                    }
                                  "
                                >
                                  <pre
                                    class="font-mono text-[10px] text-[var(--ds-text-heading)] m-0 whitespace-pre"
                                    x-text="item.code"
                                  ></pre>
                                </div>
                                <template x-if="item.note">
                                  <p
                                    class="text-[10px] text-[var(--ds-text-muted)] mt-0.5 px-1 leading-snug"
                                    x-text="item.note"
                                  ></p>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </aside>
              </div>
            </template>

            <!-- 設定 -->
            <!-- サイト情報（site.json に保存される、公開サイトに影響する設定） -->
            <template x-if="view === 'site-info'">
              <div
                class="px-8 pt-0 pb-16 max-w-5xl mx-auto"
                x-init="(async () => {
                  if (fs && (!pages || !pages.length)) pages = await fs.readPages(currentLang)
                  if (siteConfig && !siteConfig.frontPageId) siteConfig.frontPageId = frontPageId
                })()"
              >
                <div class="gh-editor-header">
                  <h1 class="text-lg font-bold">サイト情報</h1>
                  <div class="flex-1"></div>
                  <button @click="saveSiteConfig()" class="gh-btn-green text-[13px]">保存</button>
                </div>
                <div class="space-y-5">
                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">基本情報</h2>
                  <div>
                    <label class="gh-label">サイト名</label>
                    <input type="text" x-model="siteConfig.name" class="gh-input-light w-full" />
                  </div>
                  <div>
                    <label class="gh-label">サイトURL</label>
                    <input type="url" x-model="siteConfig.url" class="gh-input-light w-full" />
                  </div>
                  <div>
                    <label class="gh-label">説明</label>
                    <textarea
                      x-model="siteConfig.description"
                      rows="3"
                      class="gh-input-light w-full"
                    ></textarea>
                  </div>

                  <!-- フロントページ（/ にマップする固定ページ） -->
                  <div>
                    <label class="gh-label">フロントページ</label>
                    <select x-model="siteConfig.frontPageId" class="gh-input-light w-full">
                      <template x-for="p in pages" :key="p.id">
                        <option
                          :value="p.id"
                          x-text="(p.title || p.id) + (p.status && p.status !== 'published' ? '（下書き）' : '')"
                        ></option>
                      </template>
                    </select>
                    <p class="text-[10px] text-[var(--ds-text-muted)] mt-1 leading-snug">
                      サイトのルート（/）に公開する固定ページを選びます。選んだページは「ページ一覧」で「フロントページ」と表示され、書き出すと
                      / に配置されます（公開状態のページを選んでください）。
                    </p>
                  </div>

                  <!-- サイトロゴ -->
                  <div>
                    <label class="gh-label">サイトロゴ</label>
                    <div class="flex items-start gap-4">
                      <template x-if="logoBlobUrl">
                        <div
                          class="w-32 h-20 rounded-md border border-[var(--ds-border-default)] bg-[var(--ds-bg-surface)] flex items-center justify-center overflow-hidden p-2 shrink-0"
                        >
                          <img
                            :src="logoBlobUrl"
                            alt="logo"
                            class="max-w-full max-h-full object-contain"
                          />
                        </div>
                      </template>
                      <template x-if="!logoBlobUrl">
                        <div
                          class="w-32 h-20 rounded-md border border-dashed border-[var(--ds-border-strong)] bg-[var(--ds-bg-muted)] flex items-center justify-center text-[var(--ds-text-placeholder)] shrink-0"
                        >
                          <i data-lucide="image-plus" class="w-6 h-6"></i>
                        </div>
                      </template>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                          <label class="ds-file-button">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                            <span
                              x-text="siteConfig.logo ? 'ロゴを変更' : 'ロゴをアップロード'"
                            ></span>
                            <input
                              type="file"
                              accept=".png,.svg,.webp,.jpg,.jpeg,image/png,image/svg+xml,image/webp,image/jpeg"
                              @change="handleLogoUpload($event)"
                            />
                          </label>
                          <template x-if="siteConfig.logo">
                            <button
                              @click="removeLogo()"
                              class="text-[var(--ds-danger-600)] text-xs hover:underline whitespace-nowrap"
                            >
                              削除
                            </button>
                          </template>
                        </div>
                        <p class="text-[11px] text-[var(--ds-text-muted)] mt-2 leading-snug">
                          png / svg / webp / jpg 形式。ヘッダー等で表示されます（推奨: SVG
                          または横長の透過 PNG）
                        </p>
                      </div>
                    </div>
                  </div>

                  <!-- ファビコン -->
                  <div>
                    <label class="gh-label">ファビコン</label>
                    <div class="flex items-start gap-4">
                      <template x-if="faviconBlobUrl">
                        <div
                          class="w-12 h-12 rounded-md border border-[var(--ds-border-default)] bg-[var(--ds-bg-surface)] flex items-center justify-center overflow-hidden shrink-0"
                        >
                          <img :src="faviconBlobUrl" alt="favicon" class="max-w-full max-h-full" />
                        </div>
                      </template>
                      <template x-if="!faviconBlobUrl">
                        <div
                          class="w-12 h-12 rounded-md border border-dashed border-[var(--ds-border-strong)] bg-[var(--ds-bg-muted)] flex items-center justify-center text-[var(--ds-text-placeholder)] shrink-0"
                        >
                          <i data-lucide="image-plus" class="w-5 h-5"></i>
                        </div>
                      </template>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                          <label class="ds-file-button">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                            <span
                              x-text="siteConfig.favicon ? 'ファビコンを変更' : 'ファビコンをアップロード'"
                            ></span>
                            <input
                              type="file"
                              accept=".ico,.png,.svg,.webp,image/x-icon,image/png,image/svg+xml,image/webp"
                              @change="handleFaviconUpload($event)"
                            />
                          </label>
                          <template x-if="siteConfig.favicon">
                            <button
                              @click="removeFavicon()"
                              class="text-[var(--ds-danger-600)] text-xs hover:underline whitespace-nowrap"
                            >
                              削除
                            </button>
                          </template>
                        </div>
                        <p class="text-[11px] text-[var(--ds-text-muted)] mt-2 leading-snug">
                          ico / png / svg / webp 形式（推奨: 32×32 または 64×64 の png、もしくは
                          svg）
                        </p>
                      </div>
                    </div>
                  </div>

                  <div
                    class="rounded-md border border-[var(--ds-border-default)] bg-[var(--ds-bg-muted)] p-3 text-[12px] text-[var(--ds-text-muted)] leading-relaxed"
                  >
                    公開サイトのテーマ（見た目のテンプレート一式）は、左メニューの
                    <button
                      @click="loadThemesPage()"
                      class="text-[var(--ds-primary-600)] font-medium hover:underline"
                    >
                      テーマ
                    </button>
                    で選べます。色やフォントなどの見た目は、テーマ内のテンプレート（CSS）で直接調整します。
                  </div>

                  <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">
                    カスタムスクリプト
                  </h2>

                  <div>
                    <label class="gh-label">&lt;HEAD&gt; 内スクリプト（全ページ共通）</label>
                    <textarea
                      x-model="siteConfig.customHeadScript"
                      rows="4"
                      class="gh-input-light w-full font-mono text-xs"
                      placeholder="<!-- Google Analytics, OGP, 外部CSS等 -->"
                    ></textarea>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-1">
                      全ページの &lt;head&gt; 内に挿入されます
                    </p>
                  </div>

                  <div>
                    <label class="gh-label">&lt;/BODY&gt; 直前スクリプト（全ページ共通）</label>
                    <textarea
                      x-model="siteConfig.customBodyScript"
                      rows="4"
                      class="gh-input-light w-full font-mono text-xs"
                      placeholder="<!-- チャットウィジェット、アクセス解析等 -->"
                    ></textarea>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-1">
                      全ページの &lt;/body&gt; 直前に挿入。Alpine.js より後に実行されます
                    </p>
                  </div>

                  <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">多言語設定</h2>

                  <div>
                    <label class="gh-label">公開する言語</label>
                    <div class="flex flex-wrap gap-2 mb-3">
                      <template x-for="loc in languages.locales" :key="loc.code">
                        <span
                          class="inline-flex items-center gap-2 px-3 py-2 rounded-md border text-sm bg-[var(--ds-bg-surface)]"
                          :class="loc.code === languages.default ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] font-semibold' : 'border-[var(--ds-border-default)] text-[var(--ds-text-body)]'"
                        >
                          <span class="text-base" x-text="loc.flag"></span>
                          <span x-text="loc.label"></span>
                          <span
                            class="text-xs uppercase tracking-wider opacity-70"
                            x-text="loc.code"
                          ></span>
                          <template x-if="loc.code === languages.default">
                            <span
                              class="text-[10px] px-1.5 py-0.5 rounded bg-[var(--ds-primary-600)] text-white font-semibold tracking-wide"
                            >
                              デフォルト
                            </span>
                          </template>
                        </span>
                      </template>
                    </div>
                    <button @click="loadLangEditor()" class="gh-btn-outline text-xs">
                      <i data-lucide="languages" class="w-3.5 h-3.5"></i>
                      言語設定を編集
                    </button>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-1">
                      公開サイトで利用する言語の追加・削除、デフォルト言語の設定を行います
                    </p>
                  </div>
                </div>
              </div>
            </template>

            <!-- 設定（CMS自体の動作に関わる設定。site.json には保存されない） -->
            <template x-if="view === 'settings'">
              <div class="px-8 pt-0 pb-16 max-w-5xl mx-auto">
                <div class="gh-editor-header">
                  <h1 class="text-lg font-bold">設定</h1>
                </div>
                <p class="text-xs text-[var(--ds-text-muted)] mb-6">
                  この画面は ONE CMS
                  自体の動作設定です。サイトに関する情報（サイト名・カラーテーマなど）はサイドバーの「サイト情報」から編集してください。
                </p>
                <div class="space-y-5">
                  <!-- バージョン情報 -->
                  <div
                    class="rounded-lg border border-[var(--ds-border-default)] p-4 bg-[var(--ds-bg-muted)]"
                  >
                    <h2 class="text-base font-bold text-[var(--ds-text-heading)] mb-2">
                      バージョン情報
                    </h2>
                    <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-1 text-sm">
                      <dt class="text-[var(--ds-text-muted)]">本体バージョン</dt>
                      <dd class="text-[var(--ds-text-heading)]">
                        v
                        <span x-text="appVersion"></span>
                        <span
                          class="ml-1 inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold align-middle"
                          :class="edition === 'pro' ? 'bg-[var(--ds-primary-600)] text-white' : 'bg-[var(--ds-border-default)] text-[var(--ds-text-muted)]'"
                          x-text="edition === 'pro' ? 'PRO' : 'FREE'"
                        ></span>
                      </dd>
                      <dt class="text-[var(--ds-text-muted)]">データ形式</dt>
                      <dd class="text-[var(--ds-text-heading)]">
                        v
                        <span x-text="dataSchemaVersion"></span>
                      </dd>
                      <template x-if="licenseId">
                        <dt class="text-[var(--ds-text-muted)]">ライセンスID</dt>
                      </template>
                      <template x-if="licenseId">
                        <dd class="text-[var(--ds-text-heading)] font-mono" x-text="licenseId"></dd>
                      </template>
                    </dl>
                    <template x-if="schemaWarning">
                      <p
                        class="mt-3 text-xs text-[var(--ds-danger-600)] bg-[var(--ds-danger-600)]/5 border border-[var(--ds-danger-600)]/30 rounded p-2"
                        x-text="schemaWarning"
                      ></p>
                    </template>
                    <template x-if="lastBackupPath">
                      <p class="mt-2 text-[11px] text-[var(--ds-text-muted)]">
                        最終バックアップ:
                        <span x-text="lastBackupPath"></span>
                      </p>
                    </template>
                    <p class="mt-3 text-[11px] text-[var(--ds-text-muted)] leading-relaxed">
                      新版へは新しい cms.html
                      をダウンロードして差し替えてください。フォルダ側のコンテンツ・テンプレートは保持され、必要に応じて自動で新形式へ移行されます（移行前にバックアップを作成）。
                    </p>
                  </div>

                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">表示</h2>

                  <!-- 管理画面テーマ（light/dark/system） -->
                  <div>
                    <label class="gh-label">管理画面テーマ</label>
                    <div class="flex gap-2 flex-wrap">
                      <template
                        x-for="mode in [
                          {id:'light',label:'ライト',icon:'sun'},
                          {id:'dark',label:'ダーク',icon:'moon'},
                          {id:'system',label:'システム連動',icon:'monitor'}
                        ]"
                        :key="mode.id"
                      >
                        <button
                          @click="setThemeMode(mode.id)"
                          class="flex items-center gap-2 px-3 py-2 rounded-md border text-sm transition-all"
                          :class="themeMode === mode.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] font-semibold' : 'border-[var(--ds-border-default)] text-[var(--ds-text-body)] hover:border-[var(--ds-border-strong)]'"
                        >
                          <i :data-lucide="mode.icon" class="w-4 h-4"></i>
                          <span x-text="mode.label"></span>
                        </button>
                      </template>
                    </div>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-1">
                      ブラウザ単位の設定です。同じユーザーでも別の PC・ブラウザでは個別に設定します
                    </p>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </main>

        <!-- リビジョンパネル -->
        <aside
          x-show="showRevisionPanel"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="translate-x-full"
          class="w-80 bg-[var(--ds-bg-surface)] text-[var(--ds-text-heading)] border-l border-[var(--ds-border-default)] flex flex-col overflow-hidden"
        >
          <div
            class="flex items-center justify-between px-4 h-[52px] border-b border-[var(--ds-border-default)] shrink-0 relative z-10"
          >
            <span class="text-sm font-semibold">履歴</span>
            <button
              @click.stop="closePanel()"
              class="w-8 h-8 flex items-center justify-center text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] rounded hover:bg-[var(--ds-bg-hover)]"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="flex-1 overflow-y-auto">
            <template x-for="(rev, idx) in revisions" :key="rev.filename">
              <button
                @click="selectRevision(rev)"
                :class="selectedRevision?.filename === rev.filename ? 'bg-[var(--ds-bg-hover)]' : 'hover:bg-[var(--ds-bg-muted)]'"
                class="w-full text-left px-4 py-3 text-sm border-b border-[var(--ds-border-default)]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-xs font-medium" x-text="rev.timestamp.replace('_', ' ')"></span>
                  <template x-if="idx === 0">
                    <span
                      class="gh-badge bg-[var(--ds-primary-600)]/10 text-[var(--ds-primary-600)]"
                    >
                      最新
                    </span>
                  </template>
                </div>
                <p class="text-[var(--ds-text-muted)] text-xs mt-0.5" x-text="rev.author"></p>
              </button>
            </template>
            <template x-if="revisions.length === 0">
              <div class="px-4 py-10 text-center text-xs text-[var(--ds-text-placeholder)]">
                履歴がありません
              </div>
            </template>
            <template x-if="revisionDiff">
              <div class="p-4 border-t border-[var(--ds-border-default)]">
                <p class="text-xs font-semibold text-[var(--ds-text-muted)] mb-2">変更内容</p>
                <div
                  class="text-xs bg-[var(--ds-bg-muted)] rounded p-2 revision-diff overflow-auto max-h-48"
                  x-html="revisionDiff"
                ></div>
                <button @click="restoreRevision()" class="mt-3 w-full ds-btn-danger text-xs">
                  この版に戻す
                </button>
              </div>
            </template>
          </div>
        </aside>

        <!-- プレビューパネル -->
        <aside
          x-show="showPreviewPanel"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="translate-x-full"
          class="w-[480px] bg-[var(--ds-bg-surface)] border-l border-[var(--ds-border-default)] flex flex-col overflow-hidden"
        >
          <div
            class="flex items-center justify-between px-4 h-[52px] border-b border-[var(--ds-border-default)] shrink-0 relative z-10"
          >
            <span class="text-sm font-semibold text-[var(--ds-text-heading)]">プレビュー</span>
            <button
              @click.stop="closePanel()"
              class="w-8 h-8 flex items-center justify-center text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] rounded hover:bg-[var(--ds-bg-hover)]"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="flex-1 overflow-hidden relative">
            <iframe
              :srcdoc="previewHtml"
              class="w-full h-full border-0"
              sandbox="allow-same-origin allow-scripts"
            ></iframe>
          </div>
        </aside>
      </div>
    </template>

    <!-- ページ作成モーダル -->
    <div
      x-show="showPageCreator"
      class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
      @click.self="showPageCreator=false"
    >
      <div
        class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-sm p-6 text-[var(--ds-text-heading)]"
      >
        <h2 class="text-lg font-bold mb-4">新規ページ</h2>
        <div class="space-y-3">
          <div>
            <label class="gh-label">ページタイトル</label>
            <input
              type="text"
              x-model="editingPageTitle"
              class="gh-input-light w-full"
              placeholder="お問い合わせ"
              @keydown.enter="confirmCreatePage()"
              autofocus
            />
          </div>
          <div>
            <label class="gh-label">ページID（URL用）</label>
            <input
              type="text"
              x-model="editingPageId"
              class="gh-input-light w-full"
              placeholder="contact（空欄ならタイトルから自動生成）"
            />
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
          <button @click="showPageCreator=false" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="confirmCreatePage()" class="gh-btn-green text-xs">作成</button>
        </div>
      </div>
    </div>

    <!-- コンテンツタイプ編集モーダル -->
    <template x-if="showTypeEditor && editingType">
      <div
        class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
        @click.self="showTypeEditor=false; editingType=null"
      >
        <div
          class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-2xl max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
        >
          <h2
            class="text-lg font-bold mb-4"
            x-text="editingType.id ? 'コンテンツタイプ編集' : '新規コンテンツタイプ'"
          ></h2>
          <div class="space-y-3">
            <div>
              <label class="gh-label">ラベル</label>
              <input type="text" x-model="editingType.label" class="gh-input-light w-full" />
            </div>
            <div>
              <label class="gh-label">スラッグ (URL用)</label>
              <input
                type="text"
                x-model="editingType.slug"
                class="gh-input-light w-full"
                placeholder="news"
              />
            </div>
            <div>
              <label class="gh-label">1ページあたりの件数</label>
              <input type="number" x-model="editingType.pagination" class="gh-input-light w-24" />
            </div>
            <div class="flex flex-wrap gap-4 mt-1">
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasDate"
                  class="accent-[var(--ds-primary-600)]"
                />
                投稿日
              </label>
            </div>
            <p class="text-[11px] text-[var(--ds-text-muted)] -mt-1">
              タイトル・本文・サムネイル・カテゴリ・タグは全タイプ共通で常に表示されます。
            </p>
            <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
            <div>
              <h3 class="text-sm font-bold mb-1">入力項目（フィールドグループ）</h3>
              <p class="text-[11px] text-[var(--ds-text-muted)] mb-2 leading-snug">
                カスタム入力項目は「フィールド」画面でフィールドグループを作成し、各グループの
                <strong>表示条件</strong>
                でこの投稿タイプを指定すると、編集画面に表示されます。
              </p>
              <button type="button" @click="goEditFieldGroup()" class="gh-btn-outline text-xs">
                <i data-lucide="settings" class="w-3 h-3"></i>
                フィールドグループを管理
              </button>
            </div>
          </div>

          <div class="flex justify-between mt-6">
            <button
              x-show="editingType?.id"
              @click="deleteType()"
              class="text-[var(--ds-danger-600)] text-xs hover:underline"
            >
              削除
            </button>
            <div class="flex gap-2 ml-auto">
              <button
                @click="showTypeEditor=false; editingType=null"
                class="gh-btn-outline text-xs"
              >
                キャンセル
              </button>
              <button @click="saveType()" class="gh-btn-green text-xs">保存</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- テンプレート差分提案アップデート -->
    <template x-if="showTemplateUpdates">
      <div
        class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-[60]"
        @click.self="showTemplateUpdates = false"
        @keydown.escape.window="showTemplateUpdates = false"
      >
        <div
          class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-3xl max-h-[85vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
        >
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-lg font-bold">テンプレートの更新</h2>
            <button @click="showTemplateUpdates = false" class="ds-modal-close" title="閉じる">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <p class="text-xs text-[var(--ds-text-muted)] mb-4 leading-relaxed">
            同梱の新しい既定テンプレートと、お使いのファイルの差分です。「未編集」は安全に取り込めます。「編集済み」は差分を確認のうえ更新してください（あなたの変更は上書きされます）。
          </p>
          <template x-if="!templateUpdates.length">
            <p class="text-sm text-[var(--ds-text-muted)] py-6 text-center">すべて最新です。</p>
          </template>
          <template x-if="templateUpdates.some((u) => u.status === 'safe')">
            <button @click="applySafeTemplateUpdates()" class="gh-btn-green text-xs mb-3">
              <i data-lucide="check" class="w-3.5 h-3.5"></i>
              未編集をまとめて更新
            </button>
          </template>
          <div class="space-y-2">
            <template x-for="u in templateUpdates" :key="u.path">
              <div class="border border-[var(--ds-border-default)] rounded-md">
                <div class="flex items-center gap-2 p-2.5">
                  <span
                    class="font-mono text-xs text-[var(--ds-text-heading)] flex-1 truncate"
                    x-text="u.path"
                  ></span>
                  <span
                    class="px-1.5 py-0.5 rounded text-[10px] font-semibold shrink-0"
                    :class="u.status === 'safe' ? 'bg-[var(--ds-success-100)] text-[var(--ds-success-600)]' : 'bg-[var(--ds-warning-100)] text-[var(--ds-warning-700)]'"
                    x-text="u.status === 'safe' ? '未編集' : '編集済み'"
                  ></span>
                  <button
                    @click="viewTemplateUpdateDiff(u.path)"
                    class="gh-btn-outline text-xs shrink-0"
                  >
                    <span x-text="selectedUpdatePath === u.path ? '差分を閉じる' : '差分'"></span>
                  </button>
                  <button
                    @click="applyTemplateUpdate(u.path)"
                    class="gh-btn-green text-xs shrink-0"
                  >
                    更新
                  </button>
                </div>
                <template x-if="selectedUpdatePath === u.path && templateUpdateDiff !== null">
                  <div
                    class="border-t border-[var(--ds-border-default)] p-3 bg-[var(--ds-bg-muted)] overflow-auto max-h-72 text-xs revision-diff whitespace-pre-wrap"
                    x-html="templateUpdateDiff"
                  ></div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- フィールドタイプ選択ピッカー -->
    <template x-if="typePickerTarget">
      <div
        class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-[60]"
        @click.self="typePickerTarget=null"
        @keydown.escape.window="typePickerTarget=null"
      >
        <div
          class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-2xl max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
        >
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-lg font-bold">項目の種類を選ぶ</h2>
            <button @click="typePickerTarget=null" class="ds-modal-close" title="閉じる">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <p class="text-xs text-[var(--ds-text-muted)] mb-4">
            入力欄のタイプを選びます。あとから変更できます。
          </p>
          <template x-for="cat in fieldTypeCategories" :key="cat.id">
            <div class="mb-4">
              <h3
                class="text-xs font-bold text-[var(--ds-text-muted)] uppercase tracking-wider mb-2"
                x-text="cat.label"
              ></h3>
              <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                <template x-for="ft in fieldTypes.filter(t => t.category === cat.id)" :key="ft.id">
                  <button
                    type="button"
                    @click="selectFieldType(ft.id)"
                    class="flex items-start gap-2 p-3 rounded-lg border text-left transition-all"
                    :class="typePickerTarget && typePickerTarget.type === ft.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-600)]/5' : 'border-[var(--ds-border-default)] hover:border-[var(--ds-border-strong)] hover:bg-[var(--ds-bg-hover)]'"
                  >
                    <i
                      :data-lucide="ft.icon"
                      class="w-5 h-5 shrink-0 mt-0.5 text-[var(--ds-primary-600)]"
                    ></i>
                    <span class="min-w-0">
                      <span class="block text-sm font-medium" x-text="ft.label"></span>
                      <span
                        class="block text-[11px] text-[var(--ds-text-muted)] leading-snug"
                        x-text="ft.desc"
                      ></span>
                    </span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- タクソノミー管理モーダル（廃止 → ビュー化済み） -->

    <!-- 言語設定モーダル -->
    <div
      x-show="showLangEditor"
      class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
      @click.self="showLangEditor=false"
    >
      <div
        class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-md max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
      >
        <h2 class="text-lg font-bold mb-4">言語設定</h2>
        <div class="mb-3">
          <label class="gh-label">デフォルト言語コード</label>
          <input
            type="text"
            x-model="langEditorData.default"
            class="gh-input-light w-24"
            placeholder="ja"
          />
        </div>
        <h3 class="text-sm font-bold mb-2">言語一覧</h3>
        <div class="space-y-2 mb-3">
          <template x-for="(loc, idx) in langEditorData.locales" :key="loc.code || idx">
            <div class="flex gap-2 items-center">
              <input
                type="text"
                x-model="loc.code"
                class="gh-input-light w-16 text-xs"
                placeholder="ja"
              />
              <input
                type="text"
                x-model="loc.label"
                class="gh-input-light flex-1 text-xs"
                placeholder="日本語"
              />
              <input
                type="text"
                x-model="loc.flag"
                class="gh-input-light w-12 text-xs text-center"
                placeholder="🇯🇵"
              />
              <button @click="removeLangLocale(idx)" class="text-[var(--ds-danger-600)] text-xs">
                削除
              </button>
            </div>
          </template>
          <button @click="addLangLocale()" class="gh-btn-outline text-xs">+ 言語追加</button>
        </div>
        <div class="flex justify-end gap-2 mt-4">
          <button @click="showLangEditor=false" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="saveLangConfig()" class="gh-btn-green text-xs">保存</button>
        </div>
      </div>
    </div>

    <!-- トースト -->
    <div x-show="toast" x-transition.opacity class="ds-toast" x-text="toast"></div>

    <!-- カスタムモーダル（confirm/prompt代替） -->
    <div x-show="modalVisible" class="ds-modal-overlay" @keydown.escape.window="modalCancel()">
      <div class="ds-modal p-6" @click.stop>
        <h3 class="text-base font-bold mb-3 text-[var(--ds-text-heading)]" x-text="modalTitle"></h3>
        <p
          x-show="modalMessage"
          class="text-sm text-[var(--ds-text-muted)] mb-4"
          x-text="modalMessage"
        ></p>
        <input
          x-show="modalShowInput"
          type="text"
          x-model="modalInput"
          @keydown.enter="modalOk()"
          class="gh-input-light w-full mb-4"
          x-ref="modalInputRef"
        />
        <div class="flex justify-end gap-2">
          <button @click="modalCancel()" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="modalOk()" class="gh-btn-green text-xs">OK</button>
        </div>
      </div>
    </div>

    <!-- ローディング -->
    <div x-show="exporting" class="ds-modal-overlay">
      <div class="ds-modal p-8 text-center w-72">
        <div
          class="animate-spin w-6 h-6 border-2 border-[var(--ds-primary-600)] border-t-transparent rounded-full mx-auto mb-3"
        ></div>
        <p class="text-sm text-[var(--ds-text-muted)]">書き出し中...</p>
        <template x-if="exportProgress && exportProgress.total > 0">
          <div class="mt-3">
            <div class="h-1.5 w-full bg-[var(--ds-border-default)] rounded-full overflow-hidden">
              <div
                class="h-full bg-[var(--ds-primary-600)] transition-all duration-200"
                :style="`width: ${Math.round((exportProgress.step / exportProgress.total) * 100)}%`"
              ></div>
            </div>
            <p class="text-[11px] text-[var(--ds-text-muted)] mt-1.5">
              <span x-text="exportProgress.step"></span>
              /
              <span x-text="exportProgress.total"></span>
            </p>
          </div>
        </template>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
