<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONE CMS</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="bg-[var(--ds-bg-page)] text-[var(--ds-text-body)] min-h-screen antialiased"
    x-data="cms"
    x-cloak
  >
    <!-- ログイン -->
    <template x-if="!authorName">
      <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-xs">
          <div class="text-center mb-8">
            <div
              class="w-10 h-10 bg-[var(--ds-primary-600)] rounded-lg mx-auto mb-4 flex items-center justify-center"
            >
              <i data-lucide="pencil" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-semibold">ONE CMS</h1>
            <p class="text-sm text-[var(--ds-text-muted)] mt-1">担当者名を入力して開始</p>
          </div>
          <input
            type="text"
            x-model="authorInput"
            @keydown.enter="setAuthor()"
            placeholder="山田 太郎"
            class="gh-input w-full mb-3"
            autofocus
          />
          <button @click="setAuthor()" :disabled="!authorInput.trim()" class="gh-btn-green w-full">
            開始する
          </button>
        </div>
      </div>
    </template>

    <!-- メイン -->
    <template x-if="authorName">
      <div class="flex h-screen">
        <!-- サイドバー -->
        <aside class="gh-sidebar w-56 flex flex-col shrink-0">
          <!-- サイト名（クリックでサイト切替メニュー） -->
          <div
            class="px-3 py-3 border-b border-[var(--ds-border-subtle)] relative"
            x-data="{ siteMenuOpen: false }"
            @keydown.escape="siteMenuOpen = false"
          >
            <button
              @click="siteMenuOpen = !siteMenuOpen"
              class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-md transition hover:bg-[var(--ds-bg-hover)]"
              :class="siteMenuOpen ? 'bg-[var(--ds-bg-hover)]' : ''"
              title="サイトを切り替え"
            >
              <div
                class="w-8 h-8 bg-[var(--ds-primary-600)] text-white rounded-md flex items-center justify-center text-sm font-bold shrink-0"
                x-text="(siteConfig.name || 'G')[0]"
              ></div>
              <span
                class="text-[13px] font-semibold truncate text-[var(--ds-text-heading)] flex-1 text-left"
                x-text="siteConfig.name || 'ONE CMS'"
              ></span>
              <!-- 永続シェル要素のため Lucide(createIcons の発火タイミング依存)ではなくインライン SVG -->
              <svg
                x-show="!siteMenuOpen"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-4 h-4 text-[var(--ds-text-muted)] shrink-0"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
              <svg
                x-show="siteMenuOpen"
                x-cloak
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-4 h-4 text-[var(--ds-text-muted)] shrink-0"
              >
                <path d="m18 15-6-6-6 6" />
              </svg>
            </button>
            <div
              x-show="siteMenuOpen"
              x-cloak
              x-transition
              @click.outside="siteMenuOpen = false"
              class="absolute left-3 right-3 top-full mt-1 z-50 py-1 bg-[var(--ds-bg-surface)] border border-[var(--ds-border-default)] rounded-md shadow-[var(--ds-shadow-popup)]"
            >
              <button
                @click="siteMenuOpen = false; selectFolder()"
                class="w-full flex items-center gap-2 px-3 py-2 text-[13px] text-[var(--ds-text-body)] hover:bg-[var(--ds-bg-hover)] transition text-left"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-4 h-4 text-[var(--ds-text-muted)] shrink-0"
                >
                  <path
                    d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"
                  />
                </svg>
                <span x-text="folderHandle ? 'サイトを変更' : 'サイトを選択'"></span>
              </button>
            </div>
          </div>

          <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">
            <template x-if="folderHandle">
              <div class="space-y-0.5">
                <!-- ダッシュボード（拡張: placement === 'top'）。無料コアでは空 -->
                <template
                  x-for="ext in extensionNavItems.filter((e) => e.placement === 'top')"
                  :key="ext.id"
                >
                  <button
                    @click="view = ext.view; updateHash()"
                    :class="view === ext.view ? 'gh-nav-active' : ''"
                    class="gh-nav-item w-full"
                  >
                    <i :data-lucide="ext.icon" class="w-[18px] h-[18px]"></i>
                    <span x-text="ext.label"></span>
                  </button>
                </template>

                <div class="gh-nav-section">つくる</div>
                <button
                  @click="loadPageList()"
                  :class="view === 'page-list' || view === 'page-edit' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="file-text" class="w-[18px] h-[18px]"></i>
                  <span>ページ一覧</span>
                </button>

                <template x-for="type in contentTypes" :key="type.id">
                  <button
                    @click="openContentType(type)"
                    :class="currentType?.id === type.id ? 'gh-nav-active' : ''"
                    class="gh-nav-item w-full"
                  >
                    <i data-lucide="layers" class="w-[18px] h-[18px]"></i>
                    <span x-text="type.label" class="truncate"></span>
                  </button>
                </template>
                <button
                  @click="openTypeEditor()"
                  class="gh-nav-item w-full text-[var(--ds-text-subtle)]"
                >
                  <i data-lucide="plus" class="w-[18px] h-[18px]"></i>
                  <span>タイプ追加</span>
                </button>

                <div class="gh-nav-section">ととのえる</div>
                <button
                  @click="loadMenus()"
                  :class="view === 'menus' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="menu" class="w-[18px] h-[18px]"></i>
                  <span>メニュー</span>
                </button>
                <button
                  @click="loadTaxonomy('categories')"
                  :class="view === 'taxonomy-categories' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="folder-tree" class="w-[18px] h-[18px]"></i>
                  <span>カテゴリ</span>
                </button>
                <button
                  @click="loadTaxonomy('tags')"
                  :class="view === 'taxonomy-tags' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="tag" class="w-[18px] h-[18px]"></i>
                  <span>タグ</span>
                </button>
                <button
                  @click="loadFieldGroupEditor()"
                  :class="view === 'field-groups' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="columns-3" class="w-[18px] h-[18px]"></i>
                  <span>フィールド</span>
                </button>
                <button
                  @click="loadThemesPage()"
                  :class="view === 'themes' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="palette" class="w-[18px] h-[18px]"></i>
                  <span>テーマ</span>
                </button>

                <template x-if="location.hostname === 'localhost'">
                  <button
                    @click="loadTemplateEditor()"
                    :class="view === 'templates' ? 'gh-nav-active' : ''"
                    class="gh-nav-item w-full"
                  >
                    <i data-lucide="code" class="w-[18px] h-[18px]"></i>
                    <span>テーマ開発</span>
                  </button>
                </template>

                <!-- 点検・ツール（拡張: placement !== 'top'）。項目があるときだけ見出し -->
                <template x-if="extensionNavItems.some((e) => e.placement !== 'top')">
                  <div class="gh-nav-section">点検・ツール</div>
                </template>
                <template
                  x-for="ext in extensionNavItems.filter((e) => e.placement !== 'top')"
                  :key="ext.id"
                >
                  <button
                    @click="view = ext.view; updateHash()"
                    :class="view === ext.view ? 'gh-nav-active' : ''"
                    class="gh-nav-item w-full"
                  >
                    <i :data-lucide="ext.icon" class="w-[18px] h-[18px]"></i>
                    <span x-text="ext.label"></span>
                  </button>
                </template>

                <div class="gh-nav-section">設定</div>
                <button
                  @click="view = 'site-info'; updateHash()"
                  :class="view === 'site-info' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="globe" class="w-[18px] h-[18px]"></i>
                  <span>サイト情報</span>
                </button>
                <button
                  @click="view = 'settings'; updateHash()"
                  :class="view === 'settings' ? 'gh-nav-active' : ''"
                  class="gh-nav-item w-full"
                >
                  <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
                  <span>設定</span>
                </button>
              </div>
            </template>
          </nav>

          <div class="px-5 py-3 border-t border-[var(--ds-border-subtle)] flex items-center gap-2">
            <div
              class="w-6 h-6 rounded-full bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] flex items-center justify-center text-[10px] font-semibold"
              x-text="authorName[0]"
            ></div>
            <span
              class="text-xs text-[var(--ds-text-body)] font-medium truncate"
              x-text="authorName"
            ></span>
          </div>
        </aside>

        <!-- メインコンテンツ -->
        <main
          class="flex-1 flex flex-col overflow-hidden bg-[var(--ds-bg-page)] text-[var(--ds-text-body)]"
        >
          <!-- トップバー -->
          <header
            class="flex items-center justify-between px-8 h-[52px] shrink-0 border-b border-[var(--ds-border-default)]"
          >
            <div class="flex items-center gap-1.5 text-[13px] text-[var(--ds-text-muted)]">
              <template x-if="currentType && (view === 'content-list' || view === 'content-edit')">
                <span class="flex items-center gap-1.5">
                  <span
                    class="hover:text-[var(--ds-text-heading)] cursor-pointer"
                    @click="openContentType(currentType)"
                    x-text="currentType.label"
                  ></span>
                  <template x-if="currentPage && view === 'content-edit'">
                    <span class="flex items-center gap-1.5">
                      <i data-lucide="chevron-right" class="w-3 h-3"></i>
                      <span
                        class="text-[var(--ds-text-heading)] font-medium"
                        x-text="currentPage.title || '無題'"
                      ></span>
                    </span>
                  </template>
                </span>
              </template>
              <template x-if="view === 'page-edit' && currentPage">
                <span class="flex items-center gap-1.5">
                  <span
                    class="hover:text-[var(--ds-text-heading)] cursor-pointer"
                    @click="loadPageList()"
                  >
                    ページ
                  </span>
                  <i data-lucide="chevron-right" class="w-3 h-3"></i>
                  <span
                    class="text-[var(--ds-text-heading)] font-medium"
                    x-text="(currentPage.title || '無題') + (currentPage.id === frontPageId ? '（フロントページ）' : '')"
                  ></span>
                </span>
              </template>
              <template x-if="view === 'page-list'">
                <span class="text-[var(--ds-text-heading)] font-medium">ページ</span>
              </template>
              <template x-if="view === 'site-info'">
                <span class="text-[var(--ds-text-heading)] font-medium">サイト情報</span>
              </template>
              <template x-if="view === 'settings'">
                <span class="text-[var(--ds-text-heading)] font-medium">設定</span>
              </template>
              <template x-if="view === 'taxonomy-categories'">
                <span class="text-[var(--ds-text-heading)] font-medium">カテゴリ</span>
              </template>
              <template x-if="view === 'taxonomy-tags'">
                <span class="text-[var(--ds-text-heading)] font-medium">タグ</span>
              </template>
              <template x-if="view === 'field-groups'">
                <span class="text-[var(--ds-text-heading)] font-medium">フィールド</span>
              </template>
              <template x-if="view === 'templates'">
                <span class="flex items-center gap-1.5">
                  <span class="text-[var(--ds-text-heading)] font-medium">テンプレート</span>
                  <template x-if="currentTemplateFile">
                    <span class="flex items-center gap-1.5">
                      <i data-lucide="chevron-right" class="w-3 h-3"></i>
                      <span
                        class="text-[var(--ds-text-heading)]"
                        x-text="currentTemplateFile.split('/').pop()"
                      ></span>
                    </span>
                  </template>
                </span>
              </template>
            </div>
            <div class="flex items-center gap-2">
              <!-- 編集中のアクションをトップバーに統合 -->
              <template x-if="view === 'page-edit' || view === 'content-edit'">
                <div
                  class="flex items-center gap-2 pr-2 mr-2 border-r border-[var(--ds-border-default)]"
                >
                  <button @click="showPreview()" class="gh-btn-outline text-xs" title="プレビュー">
                    <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                    プレビュー
                  </button>
                  <button @click="showRevisions()" class="gh-btn-outline text-xs" title="履歴">
                    <i data-lucide="history" class="w-3.5 h-3.5"></i>
                    履歴
                  </button>
                  <span
                    class="gh-save-status"
                    x-show="isDirty || autoSaving"
                    x-text="autoSaving ? '保存中…' : '未保存'"
                  ></span>
                  <span
                    class="gh-save-status gh-save-status-ok"
                    x-show="!isDirty && !autoSaving && lastAutoSavedAt"
                  >
                    保存済み
                  </span>
                  <button @click="savePage()" class="gh-btn-green text-xs">保存</button>
                </div>
              </template>
              <button @click="exportSite()" class="gh-btn-green text-[13px]">
                <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                書き出し
              </button>
            </div>
          </header>

          <!-- コンテンツエリア -->
          <div class="flex-1 overflow-y-auto">
            <!-- ウェルカム -->
            <template x-if="view === 'welcome'">
              <div class="flex items-center justify-center h-full">
                <!-- フォルダ選択前 -->
                <template x-if="!folderHandle">
                  <div class="text-center max-w-md">
                    <div
                      class="w-14 h-14 rounded-xl bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] mx-auto mb-4 flex items-center justify-center"
                    >
                      <i data-lucide="folder-open" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-lg font-bold text-[var(--ds-text-heading)] mb-2">
                      サイトフォルダを選択
                    </h2>
                    <p class="text-sm text-[var(--ds-text-muted)] mb-4 leading-relaxed">
                      サイトのデータが保存されているフォルダ（または新しい空のフォルダ）を選んでください。初回はフォルダ内に必要なファイルが自動で生成されます。
                    </p>
                    <button @click="selectFolder()" class="gh-btn-green text-sm px-6 py-2.5">
                      <i data-lucide="folder-open" class="w-4 h-4"></i>
                      フォルダを選択
                    </button>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-4 leading-snug">
                      ※
                      ブラウザから「このサイトに変更の保存を許可する場所を選択してください」と表示されますが、これは
                      CMS
                      がファイルを読み書きするフォルダを指定するためのものです。安全にご利用いただけます。
                    </p>
                  </div>
                </template>
                <!-- フォルダ選択済み -->
                <template x-if="folderHandle">
                  <div class="text-center">
                    <i
                      data-lucide="layout-dashboard"
                      class="w-10 h-10 mx-auto mb-3 text-[var(--ds-text-placeholder)]"
                    ></i>
                    <p class="text-sm text-[var(--ds-text-muted)]">サイドバーからページを選択</p>
                  </div>
                </template>
              </div>
            </template>

            <!-- ページ編集（Editor.js） -->
            <template x-if="view === 'page-edit'">
              <div class="flex h-full">
                <!-- 左: エディタ本体 -->
                <div class="flex-1 overflow-y-auto">
                  <div class="gh-editor-container">
                    <!-- フロントページの案内（編集者向け） -->
                    <template x-if="currentPage?.id === frontPageId">
                      <div
                        class="mb-8 p-4 rounded-md bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] text-xs leading-relaxed"
                      >
                        このページはフロントページ（サイトの /
                        トップ）に設定されています。書き出すと URL
                        のルートに公開されます。フロントページは「設定 →
                        サイト情報」で変更できます。
                      </div>
                    </template>

                    <!-- タイトル -->
                    <textarea
                      x-model="editData.title"
                      placeholder="タイトルを追加"
                      rows="1"
                      class="gh-title-input"
                      @keydown.enter.prevent
                      @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                      x-effect="editData.title; $el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                    ></textarea>

                    <!-- 本文エディタ（全ページ共通の既定項目） -->
                    <div id="editorjs" class="gh-editorjs"></div>

                    <template x-for="section in fieldSections()" :key="section.label">
                      <div class="mb-6">
                        <template x-if="section.label">
                          <h3
                            class="text-sm font-bold text-[var(--ds-text-heading)] border-b border-[var(--ds-border-default)] pb-1.5 mb-4"
                            x-text="section.label"
                          ></h3>
                        </template>
                        <template x-for="field in section.fields" :key="field.key">
                          <div>
                            <template
                              x-if="!field.showIf || editData[field.showIf.field] === field.showIf.value"
                            >
                              <div
                                class="mb-5"
                                :class="['image','imagelist','file'].includes(field.type) ? 'bg-[var(--ds-bg-muted)] -mx-4 px-4 py-3 rounded-lg border border-[var(--ds-border-default)]' : ''"
                              >
                                <label class="gh-label">
                                  <span x-text="field.label"></span>
                                  <span x-show="field.required" class="text-[var(--ds-danger-600)]">
                                    *
                                  </span>
                                </label>
                                <p
                                  x-show="field.description"
                                  class="text-xs text-[var(--ds-text-muted)] -mt-1 mb-2"
                                  x-text="field.description"
                                ></p>
                                <template x-if="field.type === 'text'">
                                  <input
                                    type="text"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'textarea'">
                                  <textarea
                                    x-model="editData[field.key]"
                                    rows="4"
                                    class="gh-input-light w-full"
                                  ></textarea>
                                </template>
                                <template x-if="field.type === 'richtext'">
                                  <div :id="'editorjs-f-' + field.key" class="gh-editorjs"></div>
                                </template>
                                <template x-if="field.type === 'number'">
                                  <input
                                    type="number"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'url'">
                                  <input
                                    type="url"
                                    x-model="editData[field.key]"
                                    placeholder="https://"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'email'">
                                  <input
                                    type="email"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'date'">
                                  <input
                                    type="date"
                                    x-model="editData[field.key]"
                                    class="gh-input-light"
                                  />
                                </template>
                                <template x-if="field.type === 'datetime'">
                                  <input
                                    type="datetime-local"
                                    x-model="editData[field.key]"
                                    class="gh-input-light"
                                  />
                                </template>
                                <template x-if="field.type === 'select'">
                                  <select x-model="editData[field.key]" class="gh-select-light">
                                    <option value="">選択...</option>
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <option
                                        :value="opt.value || opt"
                                        x-text="opt.label || opt"
                                      ></option>
                                    </template>
                                  </select>
                                </template>
                                <template
                                  x-if="field.type === 'checkbox' || field.type === 'toggle'"
                                >
                                  <label class="flex items-center gap-2 cursor-pointer">
                                    <input
                                      type="checkbox"
                                      x-model="editData[field.key]"
                                      class="w-4 h-4 rounded border-[var(--ds-border-strong)] accent-[var(--ds-primary-600)]"
                                    />
                                    <span
                                      class="text-sm"
                                      x-text="editData[field.key] ? 'ON' : 'OFF'"
                                    ></span>
                                  </label>
                                </template>
                                <template x-if="field.type === 'image'">
                                  <div>
                                    <template x-if="editData[field.key]">
                                      <img
                                        :src="editData[field.key]"
                                        alt=""
                                        class="max-h-44 max-w-full rounded-md border border-[var(--ds-border-default)] mb-2 object-contain bg-[var(--ds-bg-muted)]"
                                      />
                                    </template>
                                    <div class="flex items-center gap-3">
                                      <label class="ds-file-button">
                                        <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                        <span
                                          x-text="editData[field.key] ? '画像を変更' : '画像を選択'"
                                        ></span>
                                        <input
                                          type="file"
                                          accept="image/*"
                                          @change="handleImageUpload($event, field.key)"
                                        />
                                      </label>
                                      <button
                                        type="button"
                                        x-show="editData[field.key]"
                                        @click="editData[field.key] = ''"
                                        class="text-xs text-[var(--ds-danger-600)] hover:underline"
                                      >
                                        削除
                                      </button>
                                    </div>
                                  </div>
                                </template>
                                <template x-if="field.type === 'file'">
                                  <div>
                                    <template x-if="editData[field.key]">
                                      <p
                                        class="text-xs text-[var(--ds-text-muted)] mb-1"
                                        x-text="editData[field.key]"
                                      ></p>
                                    </template>
                                    <label class="ds-file-button">
                                      <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                      <span
                                        x-text="editData[field.key] ? 'ファイルを変更' : 'ファイルを選択'"
                                      ></span>
                                      <input
                                        type="file"
                                        @change="handleFileUpload($event, field.key)"
                                      />
                                    </label>
                                  </div>
                                </template>
                                <template x-if="field.type === 'color'">
                                  <input
                                    type="color"
                                    x-model="editData[field.key]"
                                    class="w-10 h-8 rounded border border-[var(--ds-border-default)] cursor-pointer"
                                  />
                                </template>
                                <!-- radio -->
                                <template x-if="field.type === 'radio'">
                                  <div class="flex flex-col gap-1.5">
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <label class="flex items-center gap-2 cursor-pointer text-sm">
                                        <input
                                          type="radio"
                                          :name="field.key"
                                          :value="opt.value || opt"
                                          x-model="editData[field.key]"
                                          class="accent-[var(--ds-primary-600)]"
                                        />
                                        <span x-text="opt.label || opt"></span>
                                      </label>
                                    </template>
                                  </div>
                                </template>
                                <!-- multiselect -->
                                <template x-if="field.type === 'multiselect'">
                                  <div class="flex flex-wrap gap-2">
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <label
                                        class="flex items-center gap-1.5 px-2 py-1 border border-[var(--ds-border-default)] rounded text-xs cursor-pointer"
                                        :class="(editData[field.key]||[]).includes(opt.value||opt) ? 'bg-[var(--ds-primary-600)]/10 border-[var(--ds-primary-600)]' : ''"
                                      >
                                        <input
                                          type="checkbox"
                                          :value="opt.value || opt"
                                          x-model="editData[field.key]"
                                          class="hidden"
                                        />
                                        <span x-text="opt.label || opt"></span>
                                      </label>
                                    </template>
                                  </div>
                                </template>
                                <!-- daterange -->
                                <template x-if="field.type === 'daterange'">
                                  <div class="flex items-center gap-2">
                                    <input
                                      type="date"
                                      x-model="editData[field.key + '_from']"
                                      class="gh-input-light"
                                    />
                                    <span class="text-[var(--ds-text-muted)] text-sm">〜</span>
                                    <input
                                      type="date"
                                      x-model="editData[field.key + '_to']"
                                      class="gh-input-light"
                                    />
                                  </div>
                                </template>
                                <!-- year -->
                                <template x-if="field.type === 'year'">
                                  <input
                                    type="number"
                                    x-model="editData[field.key]"
                                    min="1900"
                                    max="2100"
                                    placeholder="2025"
                                    class="gh-input-light w-32"
                                  />
                                </template>
                                <!-- hidden -->
                                <template x-if="field.type === 'hidden'">
                                  <input type="hidden" x-model="editData[field.key]" />
                                </template>
                                <!-- imagelist -->
                                <template x-if="field.type === 'imagelist'">
                                  <div>
                                    <div class="flex flex-wrap gap-3 mb-3 pt-2 pr-2">
                                      <template
                                        x-for="(img, idx) in (editData[field.key] || [])"
                                        :key="idx"
                                      >
                                        <div class="relative inline-block">
                                          <div class="ds-media-thumb">
                                            <img :src="img" alt="" />
                                          </div>
                                          <button
                                            type="button"
                                            @click="editData[field.key].splice(idx, 1)"
                                            class="ds-media-remove"
                                            title="削除"
                                          >
                                            <i data-lucide="x"></i>
                                          </button>
                                        </div>
                                      </template>
                                    </div>
                                    <label class="ds-file-button">
                                      <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                      <span>画像を追加</span>
                                      <input
                                        type="file"
                                        accept="image/*"
                                        multiple
                                        @change="handleImageListUpload($event, field.key)"
                                      />
                                    </label>
                                  </div>
                                </template>
                                <!-- repeater -->
                                <template x-if="field.type === 'repeater'">
                                  <div class="space-y-2">
                                    <!-- サブフィールドありの場合 -->
                                    <template x-if="field.subFields && field.subFields.length">
                                      <div class="space-y-2">
                                        <template
                                          x-for="(row, idx) in (editData[field.key] || [])"
                                          :key="idx"
                                        >
                                          <div
                                            class="border border-[var(--ds-border-default)] rounded p-3 space-y-2 relative"
                                          >
                                            <button
                                              type="button"
                                              @click="editData[field.key].splice(idx, 1)"
                                              class="absolute top-1.5 right-1.5 w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--ds-danger-600)] hover:bg-[var(--ds-bg-hover)]"
                                              title="この行を削除"
                                            >
                                              <i data-lucide="x" class="w-4 h-4"></i>
                                            </button>
                                            <template x-for="sf in field.subFields" :key="sf.key">
                                              <div>
                                                <label
                                                  class="text-xs text-[var(--ds-text-muted)]"
                                                  x-text="sf.label"
                                                ></label>
                                                <template x-if="sf.type === 'textarea'">
                                                  <textarea
                                                    x-model="editData[field.key][idx][sf.key]"
                                                    rows="2"
                                                    class="gh-input-light w-full text-sm"
                                                  ></textarea>
                                                </template>
                                                <template x-if="sf.type === 'image'">
                                                  <div>
                                                    <template
                                                      x-if="editData[field.key][idx][sf.key]"
                                                    >
                                                      <img
                                                        :src="editData[field.key][idx][sf.key]"
                                                        class="max-h-20 rounded border border-[var(--ds-border-default)] mb-1"
                                                      />
                                                    </template>
                                                    <label class="ds-file-button">
                                                      <i
                                                        data-lucide="upload"
                                                        class="w-3.5 h-3.5"
                                                      ></i>
                                                      <span
                                                        x-text="editData[field.key][idx][sf.key] ? '画像を変更' : '画像を選択'"
                                                      ></span>
                                                      <input
                                                        type="file"
                                                        accept="image/*"
                                                        @change="handleImageUpload($event, '__tmp').then(() => { editData[field.key][idx][sf.key] = editData.__tmp; delete editData.__tmp })"
                                                      />
                                                    </label>
                                                  </div>
                                                </template>
                                                <template
                                                  x-if="!['textarea','image'].includes(sf.type)"
                                                >
                                                  <input
                                                    :type="sf.type === 'number' ? 'number' : sf.type === 'url' ? 'url' : sf.type === 'email' ? 'email' : sf.type === 'date' ? 'date' : 'text'"
                                                    x-model="editData[field.key][idx][sf.key]"
                                                    class="gh-input-light w-full text-sm"
                                                  />
                                                </template>
                                              </div>
                                            </template>
                                          </div>
                                        </template>
                                        <button
                                          @click="const empty = {}; field.subFields.forEach(sf => empty[sf.key] = ''); editData[field.key] = [...(editData[field.key]||[]), empty]"
                                          class="gh-btn-outline text-xs"
                                        >
                                          + 追加
                                        </button>
                                      </div>
                                    </template>
                                    <!-- サブフィールドなし（従来の文字列リスト） -->
                                    <template x-if="!field.subFields || !field.subFields.length">
                                      <div class="space-y-2">
                                        <template
                                          x-for="(row, idx) in (editData[field.key] || [])"
                                          :key="idx"
                                        >
                                          <div class="flex gap-2 items-center">
                                            <input
                                              type="text"
                                              x-model="editData[field.key][idx]"
                                              class="gh-input-light flex-1"
                                            />
                                            <button
                                              @click="editData[field.key].splice(idx,1)"
                                              class="text-[var(--ds-danger-600)] text-xs"
                                            >
                                              削除
                                            </button>
                                          </div>
                                        </template>
                                        <button
                                          @click="editData[field.key] = [...(editData[field.key]||[]), '']"
                                          class="gh-btn-outline text-xs"
                                        >
                                          + 追加
                                        </button>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                                <!-- group -->
                                <template x-if="field.type === 'group'">
                                  <div
                                    class="border border-[var(--ds-border-default)] rounded-md p-3 space-y-3"
                                  >
                                    <template x-for="sf in (field.subFields || [])" :key="sf.key">
                                      <div>
                                        <label
                                          class="text-xs text-[var(--ds-text-muted)]"
                                          x-text="sf.label || sf.key"
                                        ></label>
                                        <template x-if="sf.type === 'textarea'">
                                          <textarea
                                            x-model="editData[field.key][sf.key]"
                                            rows="2"
                                            class="gh-input-light w-full text-sm"
                                          ></textarea>
                                        </template>
                                        <template x-if="sf.type === 'image'">
                                          <div>
                                            <template x-if="editData[field.key][sf.key]">
                                              <img
                                                :src="editData[field.key][sf.key]"
                                                class="max-h-20 rounded border border-[var(--ds-border-default)] mb-1"
                                              />
                                            </template>
                                            <label class="ds-file-button">
                                              <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                              <span
                                                x-text="editData[field.key][sf.key] ? '画像を変更' : '画像を選択'"
                                              ></span>
                                              <input
                                                type="file"
                                                accept="image/*"
                                                @change="uploadImageTo($event, (url) => { editData[field.key][sf.key] = url })"
                                              />
                                            </label>
                                          </div>
                                        </template>
                                        <template x-if="!['textarea','image'].includes(sf.type)">
                                          <input
                                            :type="sf.type === 'number' ? 'number' : sf.type === 'url' ? 'url' : sf.type === 'email' ? 'email' : sf.type === 'date' ? 'date' : 'text'"
                                            x-model="editData[field.key][sf.key]"
                                            class="gh-input-light w-full text-sm"
                                          />
                                        </template>
                                      </div>
                                    </template>
                                    <template x-if="!(field.subFields && field.subFields.length)">
                                      <p class="text-xs text-[var(--ds-text-muted)]">
                                        サブフィールドが未設定です。「フィールド」画面でこのグループにサブフィールドを追加してください。
                                      </p>
                                    </template>
                                  </div>
                                </template>
                                <!-- relation -->
                                <template x-if="field.type === 'relation'">
                                  <div>
                                    <template x-if="field.relationType">
                                      <div
                                        class="space-y-1 max-h-60 overflow-y-auto border border-[var(--ds-border-default)] rounded p-2"
                                      >
                                        <template
                                          x-for="item in relationCandidates(field.relationType)"
                                          :key="item.id"
                                        >
                                          <label
                                            class="flex items-center gap-2 text-sm py-1 px-2 rounded hover:bg-[var(--ds-bg-hover)] cursor-pointer"
                                          >
                                            <input
                                              type="checkbox"
                                              :value="item.id"
                                              x-model="editData[field.key]"
                                              class="accent-[var(--ds-primary-600)]"
                                            />
                                            <span
                                              class="flex-1 truncate"
                                              x-text="item.title || item.id"
                                            ></span>
                                            <span
                                              class="text-[10px] text-[var(--ds-text-muted)]"
                                              x-text="item.publishedAt || ''"
                                            ></span>
                                          </label>
                                        </template>
                                        <template
                                          x-if="!relationCandidates(field.relationType).length"
                                        >
                                          <p
                                            class="text-xs text-[var(--ds-text-muted)] py-2 text-center"
                                          >
                                            該当するコンテンツがありません
                                          </p>
                                        </template>
                                      </div>
                                    </template>
                                    <template x-if="!field.relationType">
                                      <input
                                        type="text"
                                        x-model="editData[field.key]"
                                        placeholder="関連コンテンツID"
                                        class="gh-input-light w-full"
                                      />
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- 右: メタ情報サイドパネル -->
                <div
                  class="w-64 shrink-0 border-l border-[var(--ds-border-default)] overflow-y-auto p-5 space-y-5 bg-[var(--ds-bg-muted)]"
                >
                  <!-- 翻訳ステータス -->
                  <template x-if="languages.locales.length > 1">
                    <div>
                      <label class="gh-label">言語</label>
                      <div class="flex items-center gap-1.5 flex-wrap">
                        <template x-for="ts in translationStatuses" :key="ts.code">
                          <button
                            type="button"
                            class="gh-lang-badge"
                            :class="{
                              'gh-lang-current': ts.code === currentLang,
                              'gh-lang-translated': ts.status === 'translated' && ts.code !== currentLang,
                              'gh-lang-draft': ts.status === 'draft' && ts.code !== currentLang,
                              'gh-lang-missing': ts.status === 'missing' && ts.code !== currentLang,
                            }"
                            @click="switchLang(ts.code)"
                            :title="ts.code === currentLang ? '編集中' : ts.status === 'translated' ? '翻訳済み' : ts.status === 'draft' ? '下書き' : '未翻訳'"
                          >
                            <span x-text="ts.flag"></span>
                            <span x-text="ts.code.toUpperCase()"></span>
                            <span class="inline-flex" x-html="langStatusIconSvg(ts)"></span>
                          </button>
                        </template>
                      </div>
                      <template x-if="currentLang !== languages.default">
                        <button
                          @click="copyFromLang(languages.default)"
                          class="gh-btn-outline text-xs mt-2 w-full"
                        >
                          <i data-lucide="copy" class="w-3 h-3"></i>
                          <span x-text="languages.default.toUpperCase() + ' からコピー'"></span>
                        </button>
                      </template>
                    </div>
                  </template>

                  <!-- フロントページはルート / 固定（スラッグは URL に影響しない） -->
                  <template x-if="currentPage?.id === frontPageId">
                    <div>
                      <label class="gh-label">URL</label>
                      <p class="text-xs text-[var(--ds-text-body)] font-mono">/</p>
                      <p class="text-[10px] text-[var(--ds-text-muted)] mt-1">
                        フロントページは常にサイトのルート（/）に配置されます。フロントページの変更は「設定
                        → サイト情報」から。
                      </p>
                    </div>
                  </template>

                  <!-- フロントページ以外はスラッグ・親ページを編集可 -->
                  <template x-if="currentPage?.id !== frontPageId">
                    <div class="space-y-5">
                      <!-- スラッグ -->
                      <div>
                        <label class="gh-label">スラッグ</label>
                        <input
                          type="text"
                          x-model="editData.slug"
                          :placeholder="editData.id"
                          class="gh-input-light text-xs w-full"
                        />
                        <p
                          class="text-[10px] text-[var(--ds-text-muted)] mt-0.5"
                          x-text="'ID: ' + (currentPage?.id || editData.id)"
                        ></p>
                      </div>

                      <!-- 親ページ -->
                      <div>
                        <label class="gh-label">親ページ</label>
                        <select
                          @change="editData.parent = $event.target.value"
                          class="gh-input-light text-xs w-full"
                        >
                          <option value="" :selected="!editData.parent">なし（ルート）</option>
                          <template x-for="p in availableParentPages()" :key="p.id">
                            <option
                              :value="p.id"
                              :selected="editData.parent === p.id"
                              x-text="p.title || p.id"
                            ></option>
                          </template>
                        </select>
                        <p class="text-[10px] text-[var(--ds-text-muted)] mt-1 leading-snug">
                          子ページは親ページのURL構造を引き継ぎます。現在のURL:
                          <code
                            class="text-[var(--ds-text-heading)] font-mono"
                            x-text="pagePathPreview()"
                          ></code>
                        </p>
                      </div>
                    </div>
                  </template>

                  <!-- サムネイル（全ページ共通の既定項目） -->
                  <div>
                    <label class="gh-label">サムネイル</label>
                    <img
                      x-show="editData.image"
                      :src="editData.image"
                      class="w-full aspect-video object-cover rounded border border-[var(--ds-border-default)] mb-2"
                    />
                    <label class="ds-file-button w-full justify-center">
                      <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                      <span
                        x-text="editData.image ? 'サムネイルを変更' : 'サムネイルを選択'"
                      ></span>
                      <input
                        type="file"
                        accept="image/*"
                        @change="handleImageUpload($event, 'image')"
                      />
                    </label>
                  </div>

                  <!-- カテゴリ（全ページ共通の既定項目） -->
                  <div x-show="availableCategories.length">
                    <label class="gh-label">カテゴリ</label>
                    <select
                      x-model="editData.category"
                      x-effect="$nextTick(() => { if ($el.value !== (editData.category || '')) $el.value = editData.category || '' })"
                      class="gh-select-light text-xs w-full"
                    >
                      <option value="">未分類</option>
                      <template x-for="cat in availableCategories" :key="cat.id">
                        <option :value="cat.label" x-text="cat.label"></option>
                      </template>
                    </select>
                  </div>

                  <!-- タグ（全ページ共通の既定項目） -->
                  <div x-show="availableTags.length">
                    <label class="gh-label">タグ</label>
                    <div class="flex flex-wrap gap-1">
                      <template x-for="tag in availableTags" :key="tag.id">
                        <button
                          @click="editData.tags = editData.tags || []; editData.tags.includes(tag.label) ? editData.tags = editData.tags.filter(t => t !== tag.label) : editData.tags.push(tag.label)"
                          class="px-2 py-0.5 rounded border text-[11px] transition-all"
                          :class="(editData.tags||[]).includes(tag.label) ? 'bg-[var(--ds-primary-600)]/10 border-[var(--ds-primary-600)] text-[var(--ds-primary-600)]' : 'border-[var(--ds-border-default)] text-[var(--ds-text-muted)] hover:border-[var(--ds-border-strong)]'"
                          x-text="tag.label"
                        ></button>
                      </template>
                    </div>
                  </div>

                  <!-- ページ別カスタムスクリプト -->
                  <template x-if="true">
                    <div>
                      <label class="gh-label">カスタムスクリプト</label>
                      <textarea
                        x-model="editData.customScript"
                        rows="3"
                        class="gh-input-light w-full font-mono text-[10px]"
                        placeholder="<!-- このページ専用の script -->"
                      ></textarea>
                      <p class="text-[10px] text-[var(--ds-text-muted)] mt-0.5">
                        このページの &lt;/body&gt; 直前に挿入
                      </p>
                    </div>
                  </template>

                  <div class="h-px bg-[var(--ds-border-default)]"></div>

                  <!-- 削除（フロントページは削除不可。先に別ページをフロントに設定する必要あり） -->
                  <template x-if="currentPage?.id !== frontPageId">
                    <button
                      @click="deletePage()"
                      class="text-[var(--ds-danger-600)] text-xs hover:underline w-full text-left"
                    >
                      このページを削除
                    </button>
                  </template>
                </div>
              </div>
            </template>

            <!-- ページ一覧 -->
            <template x-if="view === 'page-list'">
              <div class="flex-1 overflow-y-auto">
                <div class="px-8 py-0">
                  <div class="gh-editor-header">
                    <h2 class="text-sm font-bold">ページ</h2>
                    <div class="flex-1"></div>
                    <button @click="createPage()" class="gh-btn-green text-[13px]">
                      <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                      新規作成
                    </button>
                  </div>
                  <div class="space-y-1">
                    <template x-for="page in pagesTree()" :key="page.id">
                      <div
                        @click="openPage(page)"
                        class="gh-list-item"
                        :style="'padding-left: ' + (16 + page.depth * 24) + 'px'"
                      >
                        <template x-if="page.depth > 0">
                          <i
                            data-lucide="corner-down-right"
                            class="w-3.5 h-3.5 text-[var(--ds-text-placeholder)] shrink-0"
                          ></i>
                        </template>
                        <div class="flex-1 min-w-0">
                          <p class="font-medium text-[14px] truncate flex items-center gap-1.5">
                            <span class="truncate" x-text="page.title || '（無題）'"></span>
                            <template x-if="page.id === frontPageId">
                              <span
                                class="shrink-0 text-[10px] font-semibold px-1.5 py-0.5 rounded bg-[var(--ds-primary-600)] text-white"
                                title="サイトの / に公開されるフロントページ"
                              >
                                フロントページ
                              </span>
                            </template>
                          </p>
                          <p
                            class="text-xs text-[var(--ds-text-muted)] mt-0.5"
                            x-text="page.id"
                          ></p>
                        </div>
                        <span
                          class="gh-badge"
                          :class="{
                            'bg-[var(--ds-primary-600)]/10 text-[var(--ds-primary-600)]': page.status === 'published' || !page.status,
                            'bg-[var(--ds-warning-500)]/10 text-[var(--ds-warning-600)]': page.status === 'draft',
                            'bg-[var(--ds-text-muted)]/10 text-[var(--ds-text-muted)]': page.status === 'archived'
                          }"
                          x-text="page.status === 'draft' ? '下書き' : page.status === 'archived' ? 'アーカイブ' : '公開中'"
                        ></span>
                      </div>
                    </template>
                    <template x-if="pages.length === 0">
                      <div class="py-16 text-center text-sm text-[var(--ds-text-placeholder)]">
                        ページがありません
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- コンテンツ一覧 -->
            <template x-if="view === 'content-list'">
              <div class="flex-1 overflow-y-auto">
                <div class="px-8 py-0">
                  <div class="gh-editor-header">
                    <h2 class="text-sm font-bold" x-text="currentType?.label"></h2>
                    <button
                      @click="openTypeEditor(currentType)"
                      class="gh-btn-outline text-xs ml-2"
                      title="タイプ設定"
                    >
                      <i data-lucide="settings" class="w-3 h-3"></i>
                    </button>
                    <div class="flex-1"></div>
                    <span
                      class="text-xs text-[var(--ds-text-muted)] mr-2"
                      x-show="contentItems.length"
                      x-text="contentItems.length + ' 件'"
                    ></span>
                    <button
                      @click="rebuildContentList()"
                      class="gh-btn-outline text-xs mr-2"
                      title="一覧を再構築"
                    >
                      <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                    </button>
                    <button @click="createContent()" class="gh-btn-green text-[13px]">
                      <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                      新規作成
                    </button>
                  </div>
                  <div class="space-y-1">
                    <template
                      x-for="item in contentItems.slice((contentPage - 1) * contentPerPage, contentPage * contentPerPage)"
                      :key="item.id"
                    >
                      <div @click="openContent(item)" class="gh-list-item">
                        <div class="flex-1 min-w-0">
                          <p
                            class="font-medium text-[14px] truncate"
                            x-text="item.title || '（無題）'"
                          ></p>
                          <p
                            class="text-xs text-[var(--ds-text-muted)] mt-0.5"
                            x-text="item.publishedAt || item._meta?.createdAt || ''"
                          ></p>
                        </div>
                        <span
                          class="gh-badge"
                          :class="{
                            'bg-[var(--ds-primary-600)]/10 text-[var(--ds-primary-600)]': item.status === 'published',
                            'bg-[var(--ds-warning-500)]/10 text-[var(--ds-warning-600)]': item.status === 'draft',
                            'bg-[var(--ds-text-muted)]/10 text-[var(--ds-text-muted)]': item.status === 'archived'
                          }"
                          x-text="item.status === 'published' ? '公開中' : item.status === 'draft' ? '下書き' : 'アーカイブ'"
                        ></span>
                      </div>
                    </template>
                    <template x-if="contentItems.length === 0">
                      <div class="py-16 text-center text-sm text-[var(--ds-text-placeholder)]">
                        コンテンツがありません
                      </div>
                    </template>
                    <template x-if="contentItems.length > contentPerPage">
                      <div class="flex items-center justify-center gap-3 py-4 text-xs">
                        <button
                          @click="contentPage = Math.max(1, contentPage - 1)"
                          :disabled="contentPage <= 1"
                          class="gh-btn-outline disabled:opacity-40 disabled:cursor-not-allowed"
                        >
                          前へ
                        </button>
                        <span class="text-[var(--ds-text-muted)]">
                          <span x-text="contentPage"></span>
                          /
                          <span x-text="Math.ceil(contentItems.length / contentPerPage)"></span>
                        </span>
                        <button
                          @click="contentPage = Math.min(Math.ceil(contentItems.length / contentPerPage), contentPage + 1)"
                          :disabled="contentPage >= Math.ceil(contentItems.length / contentPerPage)"
                          class="gh-btn-outline disabled:opacity-40 disabled:cursor-not-allowed"
                        >
                          次へ
                        </button>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- コンテンツ編集 -->
            <template x-if="view === 'content-edit'">
              <div class="flex h-full">
                <!-- 左: エディタ本体 -->
                <div class="flex-1 overflow-y-auto">
                  <div class="gh-editor-container">
                    <!-- タイトル -->
                    <textarea
                      x-model="editData.title"
                      placeholder="タイトルを追加"
                      rows="1"
                      class="gh-title-input"
                      @keydown.enter.prevent
                      @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                      x-effect="editData.title; $el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                    ></textarea>

                    <!-- 本文（全タイプ共通の既定項目） -->
                    <div class="mb-6">
                      <div id="editorjs" class="gh-editorjs"></div>
                    </div>

                    <template x-for="section in fieldSections()" :key="section.label">
                      <div class="mb-6">
                        <template x-if="section.label">
                          <h3
                            class="text-sm font-bold text-[var(--ds-text-heading)] border-b border-[var(--ds-border-default)] pb-1.5 mb-4"
                            x-text="section.label"
                          ></h3>
                        </template>
                        <template x-for="field in section.fields" :key="field.key">
                          <div>
                            <template
                              x-if="!field.showIf || editData[field.showIf.field] === field.showIf.value"
                            >
                              <div
                                class="mb-5"
                                :class="['image','imagelist','file'].includes(field.type) ? 'bg-[var(--ds-bg-muted)] -mx-4 px-4 py-3 rounded-lg border border-[var(--ds-border-default)]' : ''"
                              >
                                <label class="gh-label">
                                  <span x-text="field.label"></span>
                                  <span x-show="field.required" class="text-[var(--ds-danger-600)]">
                                    *
                                  </span>
                                </label>
                                <p
                                  x-show="field.description"
                                  class="text-xs text-[var(--ds-text-muted)] -mt-1 mb-2"
                                  x-text="field.description"
                                ></p>
                                <template x-if="field.type === 'text'">
                                  <input
                                    type="text"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'textarea'">
                                  <textarea
                                    x-model="editData[field.key]"
                                    rows="4"
                                    class="gh-input-light w-full"
                                  ></textarea>
                                </template>
                                <template x-if="field.type === 'richtext'">
                                  <div :id="'editorjs-f-' + field.key" class="gh-editorjs"></div>
                                </template>
                                <template x-if="field.type === 'number'">
                                  <input
                                    type="number"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'url'">
                                  <input
                                    type="url"
                                    x-model="editData[field.key]"
                                    placeholder="https://"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'email'">
                                  <input
                                    type="email"
                                    x-model="editData[field.key]"
                                    class="gh-input-light w-full"
                                  />
                                </template>
                                <template x-if="field.type === 'date'">
                                  <input
                                    type="date"
                                    x-model="editData[field.key]"
                                    class="gh-input-light"
                                  />
                                </template>
                                <template x-if="field.type === 'datetime'">
                                  <input
                                    type="datetime-local"
                                    x-model="editData[field.key]"
                                    class="gh-input-light"
                                  />
                                </template>
                                <template x-if="field.type === 'select'">
                                  <select x-model="editData[field.key]" class="gh-select-light">
                                    <option value="">選択...</option>
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <option
                                        :value="opt.value || opt"
                                        x-text="opt.label || opt"
                                      ></option>
                                    </template>
                                  </select>
                                </template>
                                <template
                                  x-if="field.type === 'checkbox' || field.type === 'toggle'"
                                >
                                  <label class="flex items-center gap-2 cursor-pointer">
                                    <input
                                      type="checkbox"
                                      x-model="editData[field.key]"
                                      class="w-4 h-4 rounded border-[var(--ds-border-strong)] accent-[var(--ds-primary-600)]"
                                    />
                                    <span
                                      class="text-sm"
                                      x-text="editData[field.key] ? 'ON' : 'OFF'"
                                    ></span>
                                  </label>
                                </template>
                                <template x-if="field.type === 'image'">
                                  <div>
                                    <template x-if="editData[field.key]">
                                      <img
                                        :src="editData[field.key]"
                                        alt=""
                                        class="max-h-44 max-w-full rounded-md border border-[var(--ds-border-default)] mb-2 object-contain bg-[var(--ds-bg-muted)]"
                                      />
                                    </template>
                                    <div class="flex items-center gap-3">
                                      <label class="ds-file-button">
                                        <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                        <span
                                          x-text="editData[field.key] ? '画像を変更' : '画像を選択'"
                                        ></span>
                                        <input
                                          type="file"
                                          accept="image/*"
                                          @change="handleImageUpload($event, field.key)"
                                        />
                                      </label>
                                      <button
                                        type="button"
                                        x-show="editData[field.key]"
                                        @click="editData[field.key] = ''"
                                        class="text-xs text-[var(--ds-danger-600)] hover:underline"
                                      >
                                        削除
                                      </button>
                                    </div>
                                  </div>
                                </template>
                                <template x-if="field.type === 'file'">
                                  <div>
                                    <template x-if="editData[field.key]">
                                      <p
                                        class="text-xs text-[var(--ds-text-muted)] mb-1"
                                        x-text="editData[field.key]"
                                      ></p>
                                    </template>
                                    <label class="ds-file-button">
                                      <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                      <span
                                        x-text="editData[field.key] ? 'ファイルを変更' : 'ファイルを選択'"
                                      ></span>
                                      <input
                                        type="file"
                                        @change="handleFileUpload($event, field.key)"
                                      />
                                    </label>
                                  </div>
                                </template>
                                <template x-if="field.type === 'color'">
                                  <input
                                    type="color"
                                    x-model="editData[field.key]"
                                    class="w-10 h-8 rounded border border-[var(--ds-border-default)] cursor-pointer"
                                  />
                                </template>
                                <!-- radio -->
                                <template x-if="field.type === 'radio'">
                                  <div class="flex flex-col gap-1.5">
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <label class="flex items-center gap-2 cursor-pointer text-sm">
                                        <input
                                          type="radio"
                                          :name="field.key"
                                          :value="opt.value || opt"
                                          x-model="editData[field.key]"
                                          class="accent-[var(--ds-primary-600)]"
                                        />
                                        <span x-text="opt.label || opt"></span>
                                      </label>
