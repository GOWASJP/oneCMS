                                    </template>
                                  </div>
                                </template>
                                <!-- multiselect -->
                                <template x-if="field.type === 'multiselect'">
                                  <div class="flex flex-wrap gap-2">
                                    <template
                                      x-for="opt in (field.options || [])"
                                      :key="opt.value || opt"
                                    >
                                      <label
                                        class="flex items-center gap-1.5 px-2 py-1 border border-[var(--ds-border-default)] rounded text-xs cursor-pointer"
                                        :class="(editData[field.key]||[]).includes(opt.value||opt) ? 'bg-[var(--ds-primary-600)]/10 border-[var(--ds-primary-600)]' : ''"
                                      >
                                        <input
                                          type="checkbox"
                                          :value="opt.value || opt"
                                          x-model="editData[field.key]"
                                          class="hidden"
                                        />
                                        <span x-text="opt.label || opt"></span>
                                      </label>
                                    </template>
                                  </div>
                                </template>
                                <!-- daterange -->
                                <template x-if="field.type === 'daterange'">
                                  <div class="flex items-center gap-2">
                                    <input
                                      type="date"
                                      x-model="editData[field.key + '_from']"
                                      class="gh-input-light"
                                    />
                                    <span class="text-[var(--ds-text-muted)] text-sm">〜</span>
                                    <input
                                      type="date"
                                      x-model="editData[field.key + '_to']"
                                      class="gh-input-light"
                                    />
                                  </div>
                                </template>
                                <!-- year -->
                                <template x-if="field.type === 'year'">
                                  <input
                                    type="number"
                                    x-model="editData[field.key]"
                                    min="1900"
                                    max="2100"
                                    placeholder="2025"
                                    class="gh-input-light w-32"
                                  />
                                </template>
                                <!-- hidden -->
                                <template x-if="field.type === 'hidden'">
                                  <input type="hidden" x-model="editData[field.key]" />
                                </template>
                                <!-- imagelist -->
                                <template x-if="field.type === 'imagelist'">
                                  <div>
                                    <div class="flex flex-wrap gap-3 mb-3 pt-2 pr-2">
                                      <template
                                        x-for="(img, idx) in (editData[field.key] || [])"
                                        :key="idx"
                                      >
                                        <div class="relative inline-block">
                                          <div class="ds-media-thumb">
                                            <img :src="img" alt="" />
                                          </div>
                                          <button
                                            type="button"
                                            @click="editData[field.key].splice(idx, 1)"
                                            class="ds-media-remove"
                                            title="削除"
                                          >
                                            <i data-lucide="x"></i>
                                          </button>
                                        </div>
                                      </template>
                                    </div>
                                    <label class="ds-file-button">
                                      <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                      <span>画像を追加</span>
                                      <input
                                        type="file"
                                        accept="image/*"
                                        multiple
                                        @change="handleImageListUpload($event, field.key)"
                                      />
                                    </label>
                                  </div>
                                </template>
                                <!-- repeater -->
                                <template x-if="field.type === 'repeater'">
                                  <div class="space-y-2">
                                    <!-- サブフィールドありの場合 -->
                                    <template x-if="field.subFields && field.subFields.length">
                                      <div class="space-y-2">
                                        <template
                                          x-for="(row, idx) in (editData[field.key] || [])"
                                          :key="idx"
                                        >
                                          <div
                                            class="border border-[var(--ds-border-default)] rounded p-3 space-y-2 relative"
                                          >
                                            <button
                                              type="button"
                                              @click="editData[field.key].splice(idx, 1)"
                                              class="absolute top-1.5 right-1.5 w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--ds-danger-600)] hover:bg-[var(--ds-bg-hover)]"
                                              title="この行を削除"
                                            >
                                              <i data-lucide="x" class="w-4 h-4"></i>
                                            </button>
                                            <template x-for="sf in field.subFields" :key="sf.key">
                                              <div>
                                                <label
                                                  class="text-xs text-[var(--ds-text-muted)]"
                                                  x-text="sf.label"
                                                ></label>
                                                <template x-if="sf.type === 'textarea'">
                                                  <textarea
                                                    x-model="editData[field.key][idx][sf.key]"
                                                    rows="2"
                                                    class="gh-input-light w-full text-sm"
                                                  ></textarea>
                                                </template>
                                                <template x-if="sf.type === 'image'">
                                                  <div>
                                                    <template
                                                      x-if="editData[field.key][idx][sf.key]"
                                                    >
                                                      <img
                                                        :src="editData[field.key][idx][sf.key]"
                                                        class="max-h-20 rounded border border-[var(--ds-border-default)] mb-1"
                                                      />
                                                    </template>
                                                    <label class="ds-file-button">
                                                      <i
                                                        data-lucide="upload"
                                                        class="w-3.5 h-3.5"
                                                      ></i>
                                                      <span
                                                        x-text="editData[field.key][idx][sf.key] ? '画像を変更' : '画像を選択'"
                                                      ></span>
                                                      <input
                                                        type="file"
                                                        accept="image/*"
                                                        @change="handleImageUpload($event, '__tmp').then(() => { editData[field.key][idx][sf.key] = editData.__tmp; delete editData.__tmp })"
                                                      />
                                                    </label>
                                                  </div>
                                                </template>
                                                <template
                                                  x-if="!['textarea','image'].includes(sf.type)"
                                                >
                                                  <input
                                                    :type="sf.type === 'number' ? 'number' : sf.type === 'url' ? 'url' : sf.type === 'email' ? 'email' : sf.type === 'date' ? 'date' : 'text'"
                                                    x-model="editData[field.key][idx][sf.key]"
                                                    class="gh-input-light w-full text-sm"
                                                  />
                                                </template>
                                              </div>
                                            </template>
                                          </div>
                                        </template>
                                        <button
                                          @click="const empty = {}; field.subFields.forEach(sf => empty[sf.key] = ''); editData[field.key] = [...(editData[field.key]||[]), empty]"
                                          class="gh-btn-outline text-xs"
                                        >
                                          + 追加
                                        </button>
                                      </div>
                                    </template>
                                    <!-- サブフィールドなし（従来の文字列リスト） -->
                                    <template x-if="!field.subFields || !field.subFields.length">
                                      <div class="space-y-2">
                                        <template
                                          x-for="(row, idx) in (editData[field.key] || [])"
                                          :key="idx"
                                        >
                                          <div class="flex gap-2 items-center">
                                            <input
                                              type="text"
                                              x-model="editData[field.key][idx]"
                                              class="gh-input-light flex-1"
                                            />
                                            <button
                                              @click="editData[field.key].splice(idx,1)"
                                              class="text-[var(--ds-danger-600)] text-xs"
                                            >
                                              削除
                                            </button>
                                          </div>
                                        </template>
                                        <button
                                          @click="editData[field.key] = [...(editData[field.key]||[]), '']"
                                          class="gh-btn-outline text-xs"
                                        >
                                          + 追加
                                        </button>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                                <!-- group -->
                                <template x-if="field.type === 'group'">
                                  <div
                                    class="border border-[var(--ds-border-default)] rounded-md p-3 space-y-3"
                                  >
                                    <template x-for="sf in (field.subFields || [])" :key="sf.key">
                                      <div>
                                        <label
                                          class="text-xs text-[var(--ds-text-muted)]"
                                          x-text="sf.label || sf.key"
                                        ></label>
                                        <template x-if="sf.type === 'textarea'">
                                          <textarea
                                            x-model="editData[field.key][sf.key]"
                                            rows="2"
                                            class="gh-input-light w-full text-sm"
                                          ></textarea>
                                        </template>
                                        <template x-if="sf.type === 'image'">
                                          <div>
                                            <template x-if="editData[field.key][sf.key]">
                                              <img
                                                :src="editData[field.key][sf.key]"
                                                class="max-h-20 rounded border border-[var(--ds-border-default)] mb-1"
                                              />
                                            </template>
                                            <label class="ds-file-button">
                                              <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                                              <span
                                                x-text="editData[field.key][sf.key] ? '画像を変更' : '画像を選択'"
                                              ></span>
                                              <input
                                                type="file"
                                                accept="image/*"
                                                @change="uploadImageTo($event, (url) => { editData[field.key][sf.key] = url })"
                                              />
                                            </label>
                                          </div>
                                        </template>
                                        <template x-if="!['textarea','image'].includes(sf.type)">
                                          <input
                                            :type="sf.type === 'number' ? 'number' : sf.type === 'url' ? 'url' : sf.type === 'email' ? 'email' : sf.type === 'date' ? 'date' : 'text'"
                                            x-model="editData[field.key][sf.key]"
                                            class="gh-input-light w-full text-sm"
                                          />
                                        </template>
                                      </div>
                                    </template>
                                    <template x-if="!(field.subFields && field.subFields.length)">
                                      <p class="text-xs text-[var(--ds-text-muted)]">
                                        サブフィールドが未設定です。「フィールド」画面でこのグループにサブフィールドを追加してください。
                                      </p>
                                    </template>
                                  </div>
                                </template>
                                <!-- relation -->
                                <template x-if="field.type === 'relation'">
                                  <div>
                                    <template x-if="field.relationType">
                                      <div
                                        class="space-y-1 max-h-60 overflow-y-auto border border-[var(--ds-border-default)] rounded p-2"
                                      >
                                        <template
                                          x-for="item in relationCandidates(field.relationType)"
                                          :key="item.id"
                                        >
                                          <label
                                            class="flex items-center gap-2 text-sm py-1 px-2 rounded hover:bg-[var(--ds-bg-hover)] cursor-pointer"
                                          >
                                            <input
                                              type="checkbox"
                                              :value="item.id"
                                              x-model="editData[field.key]"
                                              class="accent-[var(--ds-primary-600)]"
                                            />
                                            <span
                                              class="flex-1 truncate"
                                              x-text="item.title || item.id"
                                            ></span>
                                            <span
                                              class="text-[10px] text-[var(--ds-text-muted)]"
                                              x-text="item.publishedAt || ''"
                                            ></span>
                                          </label>
                                        </template>
                                        <template
                                          x-if="!relationCandidates(field.relationType).length"
                                        >
                                          <p
                                            class="text-xs text-[var(--ds-text-muted)] py-2 text-center"
                                          >
                                            該当するコンテンツがありません
                                          </p>
                                        </template>
                                      </div>
                                    </template>
                                    <template x-if="!field.relationType">
                                      <input
                                        type="text"
                                        x-model="editData[field.key]"
                                        placeholder="関連コンテンツID"
                                        class="gh-input-light w-full"
                                      />
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- 右: メタ情報サイドパネル -->
                <div
                  class="w-64 shrink-0 border-l border-[var(--ds-border-default)] overflow-y-auto p-5 space-y-5 bg-[var(--ds-bg-muted)]"
                >
                  <!-- ステータス -->
                  <div>
                    <label class="gh-label">ステータス</label>
                    <select x-model="editData.status" class="gh-select-light text-xs w-full">
                      <option value="draft">下書き</option>
                      <option value="published">公開中</option>
                      <option value="archived">アーカイブ</option>
                    </select>
                  </div>

                  <!-- 投稿日 -->
                  <template x-if="currentType?.hasDate">
                    <div>
                      <label class="gh-label">投稿日</label>
                      <input
                        type="date"
                        x-model="editData.publishedAt"
                        class="gh-input-light text-xs w-full"
                      />
                    </div>
                  </template>

                  <!-- スラッグ -->
                  <div>
                    <label class="gh-label">スラッグ</label>
                    <input
                      type="text"
                      x-model="editData.slug"
                      :placeholder="editData.id"
                      class="gh-input-light text-xs w-full"
                    />
                    <p
                      class="text-[10px] text-[var(--ds-text-muted)] mt-0.5"
                      x-text="'ID: ' + (currentPage?.id || editData.id)"
                    ></p>
                  </div>

                  <!-- サムネイル（全タイプ共通の既定項目） -->
                  <template x-if="true">
                    <div>

                            class="font-mono text-xs text-[var(--ds-text-heading)] select-all m-0 whitespace-pre"

                          ></pre>
                          <span
                            class="absolute top-2 right-2 text-[var(--ds-text-muted)] opacity-0 group-hover:opacity-100 transition-opacity text-[10px]"
                          >
                            クリックでコピー
                          </span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

                    <h2 class="text-sm font-bold">タグ</h2>
                    <div class="flex-1"></div>
                    <button @click="saveTaxonomies()" class="gh-btn-green text-[13px]">保存</button>
                  </div>
                  <p class="text-xs text-[var(--ds-text-muted)] mb-4">
                    記事に割り当てるタグを管理します。スラッグはURLに使用されます。

                      >
                        <div class="flex-1">
                          <label class="text-xs text-[var(--ds-text-muted)]">名前</label>
                          <input
                            type="text"
                            x-model="tag.label"
                            placeholder="タグ名"
                            class="gh-input-light w-full"
                          />
                        </div>
                        <div class="w-48">
                          <label class="text-xs text-[var(--ds-text-muted)]">スラッグ</label>
                          <input
                            type="text"
                            x-model="tag.slug"
                            :placeholder="tag.label"
                            class="gh-input-light w-full"
                          />
                        </div>
                        <button
                          @click="taxonomyData.tags.splice(idx,1)"

                          削除

                      </div>
                    </template>
                  </div>
                  <button

                        <p
                          class="text-[10px] text-[var(--ds-text-muted)] mb-1"
                          x-text="snippet.label"
                        ></p>
                        <div
                          class="bg-[var(--ds-bg-muted)] border border-[var(--ds-border-default)] rounded-md p-3 cursor-pointer relative group overflow-x-auto"
                          @click="navigator.clipboard.writeText(snippet.code); showToast('コピーしました')"
                        >
                          <pre
                            class="font-mono text-xs text-[var(--ds-text-heading)] select-all m-0 whitespace-pre"
                            x-text="snippet.code"
                          ></pre>
                          <span
                            class="absolute top-2 right-2 text-[var(--ds-text-muted)] opacity-0 group-hover:opacity-100 transition-opacity text-[10px]"
                          >
                            クリックでコピー
                          </span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- フィールドグループ管理 -->
            <template x-if="view === 'field-groups'">
              <div class="flex h-full">
                <!-- 左: グループ一覧 -->

                      <template x-for="g in fieldGroups" :key="g.id">
                        <button
                          @click="openFieldGroup(g)"
                          :class="currentFieldGroup?.id === g.id ? 'bg-[var(--ds-success-100)] text-[var(--ds-text-heading)] font-medium' : 'text-[var(--ds-text-muted)] hover:bg-[var(--ds-bg-hover)]'"

                      </template>
                    </div>
                  </div>
                  <div class="p-3 border-t border-[var(--ds-border-default)]">
                    <button @click="createFieldGroup()" class="gh-btn-green text-xs w-full">

                      新規グループ
                    </button>
                  </div>
                </div>

                <div class="flex-1 overflow-y-auto">
                  <template x-if="currentFieldGroup">
                    <div class="px-8 py-0">
                      <div class="gh-editor-header">
                        <h2

                          x-text="currentFieldGroup.id ? currentFieldGroup.label : '新規フィールドグループ'"

                        <div class="flex-1"></div>
                        <button
                          x-show="currentFieldGroup.id"
                          @click="deleteFieldGroup()"
                          class="text-[var(--ds-danger-600)] text-xs hover:underline mr-2"

                          削除

                        <button @click="saveFieldGroup()" class="gh-btn-green text-[13px]">

                        </button>
                      </div>

                      <div class="space-y-4">

                          <div class="flex-1">

                              x-model="currentFieldGroup.label"
                              class="gh-input-light w-full"
                            />
                          </div>
                          <div class="w-48" x-show="!currentFieldGroup.id">

                              x-model="currentFieldGroup.id"
                              class="gh-input-light w-full"
                              placeholder="自動"
                            />

                          </p>

                            <template
                              x-for="(loc, li) in (currentFieldGroup.locations || [])"

                              <div class="flex items-center gap-2">

                                  <option
                                    value="page:*"
                                    :selected="loc.target === 'page' && loc.value === '*'"
                                  >
                                    すべての固定ページ
                                  </option>
                                  <template x-for="p in pages" :key="'pg-' + p.id">
                                    <option
                                      :value="'page:' + p.id"
                                      :selected="loc.target === 'page' && loc.value === p.id"
                                      x-text="'固定ページ: ' + (p.title || p.id)"
                                    ></option>
                                  </template>
                                  <option
                                    value="contentType:*"
                                    :selected="loc.target === 'contentType' && loc.value === '*'"
                                  >
                                    すべての投稿タイプ
                                  </option>
                                  <template x-for="t in contentTypes" :key="'ct-' + t.id">
                                    <option
                                      :value="'contentType:' + t.id"
                                      :selected="loc.target === 'contentType' && loc.value === t.id"
                                      x-text="'投稿タイプ: ' + t.label"
                                    ></option>
                                  </template>
                                </select>
                                <button
                                  type="button"
                                  @click="currentFieldGroup.locations.splice(li, 1)"
                                  class="text-[var(--ds-danger-600)] text-xs hover:underline shrink-0"
                                >
                                  削除
                                </button>
                              </div>
                            </template>
                          </div>
                          <button
                            type="button"
                            @click="addLocationRule()"
                            class="gh-btn-outline text-xs mt-2"
                          >
                            <i data-lucide="plus" class="w-3 h-3"></i>
                            条件を追加
                          </button>
                          <p
                            x-show="!(currentFieldGroup.locations || []).length"
                            class="text-[11px] text-[var(--ds-text-muted)] mt-1"
                          >
                            条件が未設定の場合、このグループはどの編集画面にも表示されません。
                          </p>

                        <!-- フィールド定義 -->

                          </p>
                          <div class="space-y-2">
                            <template x-for="(f, idx) in currentFieldGroup.fields" :key="idx">
                              <div
                                class="border border-[var(--ds-border-default)] rounded p-2 space-y-2"
                              >
                                <div class="flex gap-2 items-end">
                                  <div class="flex-1">
                                    <label class="text-xs text-[var(--ds-text-muted)]">
                                      ラベル（画面に表示される名前）
                                    </label>
                                    <input
                                      type="text"
                                      x-model="f.label"
                                      @input="onFieldLabelInput(f)"
                                      placeholder="例: 開催日"
                                      class="gh-input-light w-full text-xs"
                                    />
                                  </div>
                                  <div class="w-44">
                                    <label class="text-xs text-[var(--ds-text-muted)]">種類</label>
                                    <button
                                      type="button"
                                      @click="openTypePicker(f)"
                                      class="gh-input-light w-full text-xs flex items-center justify-between gap-1 text-left"
                                    >
                                      <span x-text="fieldTypeLabel(f.type)"></span>
                                      <i
                                        data-lucide="chevron-down"
                                        class="w-3.5 h-3.5 shrink-0 text-[var(--ds-text-muted)]"
                                      ></i>
                                    </button>
                                  </div>
                                  <button
                                    @click="removeFieldFromGroup(idx)"
                                    class="text-[var(--ds-danger-600)] text-xs pb-1"
                                  >
                                    削除
                                  </button>
                                </div>
                                <div>
                                  <input
                                    type="text"
                                    x-model="f.description"
                                    placeholder="記入者向けの補足説明（任意）"
                                    class="gh-input-light w-full text-xs"
                                  />
                                </div>
                                <!-- required + 詳細 -->
                                <div class="flex items-center gap-4">
                                  <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                                    <input
                                      type="checkbox"
                                      x-model="f.required"
                                      class="accent-[var(--ds-primary-600)]"
                                    />
                                    必須
                                  </label>
                                  <button
                                    @click="f._expanded = !f._expanded"
                                    type="button"
                                    class="text-xs text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] ml-auto"
                                  >
                                    <span x-text="f._expanded ? '詳細を閉じる' : '詳細設定'"></span>
                                  </button>
                                </div>
                                <!-- 展開式詳細 -->
                                <template x-if="f._expanded">
                                  <div
                                    class="space-y-3 pt-2 border-t border-[var(--ds-border-default)]"
                                  >
                                    <div>
                                      <label
                                        class="text-xs text-[var(--ds-text-muted)] font-medium"
                                      >
                                        キー（英数字・URL や出力に使用。通常は自動生成のままで OK）
                                      </label>
                                      <input
                                        type="text"
                                        x-model="f.key"
                                        @input="f._keyEdited = true"
                                        class="gh-input-light w-full text-xs mt-1"
                                      />
                                    </div>
                                    <template
                                      x-if="['select','multiselect','radio'].includes(f.type)"
                                    >
                                      <div>
                                        <label
                                          class="text-xs text-[var(--ds-text-muted)] font-medium"
                                        >
                                          選択肢
                                        </label>
                                        <div class="space-y-1 mt-1">
                                          <template
                                            x-for="(opt, oi) in (f.options || [])"
                                            :key="oi"
                                          >
                                            <div class="flex gap-1 items-center">
                                              <input
                                                type="text"
                                                :value="opt"
                                                @input="f.options[oi] = $event.target.value"
                                                placeholder="値"
                                                class="gh-input-light flex-1 text-xs"
                                              />
                                              <button
                                                @click="f.options.splice(oi, 1)"
                                                type="button"
                                                class="text-[var(--ds-danger-600)] text-xs px-1"
                                              >
                                                &times;
                                              </button>
                                            </div>
                                          </template>
                                        </div>
                                        <button
                                          @click="f.options = [...(f.options||[]), '']"
                                          type="button"
                                          class="text-xs text-[var(--ds-primary-600)] hover:underline mt-1"
                                        >
                                          + 選択肢追加
                                        </button>
                                      </div>
                                    </template>
                                    <template x-if="['repeater', 'group'].includes(f.type)">
                                      <div>
                                        <label
                                          class="text-xs text-[var(--ds-text-muted)] font-medium"
                                        >
                                          サブフィールド
                                        </label>
                                        <div class="space-y-1 mt-1">
                                          <template
                                            x-for="(sf, si) in (f.subFields || [])"
                                            :key="si"
                                          >
                                            <div class="flex gap-1 items-end">
                                              <div class="flex-1">
                                                <input
                                                  type="text"
                                                  :value="sf.key"
                                                  @input="f.subFields[si].key = $event.target.value"
                                                  placeholder="キー"
                                                  class="gh-input-light w-full text-xs"
                                                />
                                              </div>
                                              <div class="flex-1">
                                                <input
                                                  type="text"
                                                  :value="sf.label"
                                                  @input="f.subFields[si].label = $event.target.value"
                                                  placeholder="ラベル"
                                                  class="gh-input-light w-full text-xs"
                                                />
                                              </div>
                                              <div class="w-20">
                                                <select
                                                  x-model="sf.type"
                                                  class="gh-select-light w-full text-xs"
                                                >
                                                  <template
                                                    x-for="st in ['text','textarea','number','url','email','date','image','select']"
                                                    :key="st"
                                                  >
                                                    <option :value="st" x-text="st"></option>
                                                  </template>
                                                </select>
                                              </div>
                                              <button
                                                @click="f.subFields.splice(si, 1)"
                                                type="button"
                                                class="text-[var(--ds-danger-600)] text-xs px-1"
                                              >
                                                &times;
                                              </button>
                                            </div>
                                          </template>
                                        </div>
                                        <button
                                          @click="f.subFields = [...(f.subFields||[]), {key:'', label:'', type:'text'}]"
                                          type="button"
                                          class="text-xs text-[var(--ds-primary-600)] hover:underline mt-1"
                                        >
                                          + サブフィールド追加
                                        </button>
                                      </div>
                                    </template>
                                    <div>
                                      <label
                                        class="text-xs text-[var(--ds-text-muted)] font-medium"
                                      >
                                        条件表示 (showIf)
                                      </label>
                                      <div class="flex gap-2 mt-1">
                                        <input
                                          type="text"
                                          x-model="f.showIf_field"
                                          placeholder="フィールドキー"
                                          class="gh-input-light flex-1 text-xs"
                                        />
                                        <input
                                          type="text"
                                          x-model="f.showIf_value"
                                          placeholder="値"
                                          class="gh-input-light flex-1 text-xs"
                                        />
                                      </div>
                                      <p class="text-[10px] text-[var(--ds-text-muted)] mt-0.5">
                                        指定フィールドが指定値のときのみ表示
                                      </p>
                                    </div>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                          <button @click="addFieldToGroup()" class="gh-btn-outline text-xs mt-2">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                            入力項目を追加
                          </button>
                        </div>

                        <!-- テンプレートコード -->
                        <template x-if="currentFieldGroup.id && currentFieldGroup.fields?.length">
                          <div class="border-t border-[var(--ds-border-default)] pt-4">
                            <h3 class="text-sm font-bold mb-2">テンプレートコード</h3>
                            <p class="text-xs text-[var(--ds-text-muted)] mb-3">
                              テンプレートファイルに貼り付けてフィールドを表示できます。
                            </p>
                            <div
                              class="bg-[var(--ds-bg-muted)] border border-[var(--ds-border-default)] rounded-md p-3 cursor-pointer relative group overflow-x-auto"
                              @click="navigator.clipboard.writeText($el.querySelector('pre').textContent); showToast('コピーしました')"
                            >
                              <pre
                                class="font-mono text-xs text-[var(--ds-text-heading)] select-all m-0 whitespace-pre"
                                x-text="getFieldTemplateCode({...currentFieldGroup, slug: currentFieldGroup.id})"
                              ></pre>
                              <span
                                class="absolute top-2 right-2 text-[var(--ds-text-muted)] opacity-0 group-hover:opacity-100 transition-opacity text-xs"
                              >
                                クリックでコピー
                              </span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!currentFieldGroup">
                    <div class="flex-1 flex items-center justify-center h-full">
                      <p class="text-sm text-[var(--ds-text-muted)]">
                        フィールドグループを選択または新規作成
                      </p>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- テーマ（テーマ選択。WP の「外観 → テーマ」相当。見た目はテーマ内で直接コーディング） -->
            <template x-if="view === 'themes'">
              <div class="px-8 pt-0 pb-16 max-w-5xl mx-auto">
                <div class="gh-editor-header">
                  <h1 class="text-lg font-bold">テーマ</h1>
                </div>

                <div class="space-y-6">
                  <!-- テーマを選ぶ -->
                  <div>
                    <h2 class="text-base font-bold text-[var(--ds-text-heading)] mb-1">
                      テーマを選ぶ
                    </h2>
                    <p class="text-[12px] text-[var(--ds-text-muted)] mb-3">
                      サイトの見た目（テンプレート一式）を選びます。「有効化」で即座に切り替わります。
                    </p>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">
                      <template x-for="t in installedThemes" :key="t.id">
                        <div
                          class="border rounded-lg p-4 transition"
                          :class="activeThemeId === t.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-100)]' : 'border-[var(--ds-border-default)] bg-[var(--ds-bg-surface)]'"
                        >
                          <div class="flex items-center gap-2 mb-1">
                            <i
                              data-lucide="palette"
                              class="w-4 h-4 text-[var(--ds-primary-600)]"
                            ></i>
                            <span class="font-bold text-sm truncate" x-text="t.name"></span>
                          </div>
                          <p
                            class="text-[11px] text-[var(--ds-text-muted)] mb-3"
                            x-text="((t.version ? 'v' + t.version : '') + (t.author ? ' / ' + t.author : '')) || 'テーマパッケージ'"
                          ></p>
                          <template x-if="activeThemeId === t.id">
                            <span
                              class="inline-flex items-center gap-1 text-[11px] font-semibold text-[var(--ds-primary-600)]"
                            >
                              <i data-lucide="circle-check" class="w-3.5 h-3.5"></i>
                              使用中
                            </span>
                          </template>
                          <template x-if="activeThemeId !== t.id">
                            <button @click="switchTheme(t.id)" class="gh-btn-outline text-[12px]">
                              有効化
                            </button>
                          </template>
                        </div>
                      </template>
                    </div>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-3 leading-snug">
                      テーマは保存先フォルダの
                      <code class="font-mono">themes/&lt;id&gt;/</code>
                      に置かれた差し替え可能なパッケージです。
                      <code class="font-mono">theme.json</code>
                      を含む新しいテーマフォルダを追加すると、ここに表示されます。
                    </p>
                  </div>
                </div>
              </div>
            </template>

            <!-- テンプレートエディタ -->
            <template x-if="view === 'templates'">
              <div
                class="flex h-full"
                x-data="{ refWidth: Number(localStorage.getItem('cms-ref-width')) || 320 }"

                  class="w-64 shrink-0 border-r border-[var(--ds-border-default)] overflow-y-auto bg-[var(--ds-bg-muted)]"

                  <div class="p-3">
