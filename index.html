                            固定ページ
                          </summary>
                          <div class="p-2 space-y-0.5 max-h-32 overflow-y-auto">
                            <template x-for="p in pages" :key="p.id">
                              <button
                                @click="addMenuItem('page', p.title || p.id, '/' + (p.id === 'index' ? '' : p.id + '/'), p.id)"
                                class="block w-full text-left px-2 py-1.5 text-xs rounded hover:bg-[var(--ds-bg-hover)] truncate"
                                x-text="p.title || p.id"
                              ></button>
                            </template>
                          </div>
                        </details>
                        <details class="border border-[var(--ds-border-default)] rounded-md">
                          <summary
                            class="px-3 py-2 text-xs font-semibold text-[var(--ds-text-muted)] bg-[var(--ds-bg-surface)] rounded-t-md"
                          >
                            投稿タイプ
                          </summary>
                          <div class="p-2 space-y-0.5 max-h-32 overflow-y-auto">
                            <template x-for="t in contentTypes" :key="t.id">
                              <button
                                @click="addMenuItem('post_type', t.label, '/' + t.slug + '/', t.id)"
                                class="block w-full text-left px-2 py-1.5 text-xs rounded hover:bg-[var(--ds-bg-hover)] truncate"
                                x-text="t.label"
                              ></button>
                            </template>
                          </div>
                        </details>
                        <details class="border border-[var(--ds-border-default)] rounded-md">
                          <summary
                            class="px-3 py-2 text-xs font-semibold text-[var(--ds-text-muted)] bg-[var(--ds-bg-surface)] rounded-t-md"
                          >
                            カテゴリ
                          </summary>
                          <div class="p-2 space-y-0.5 max-h-32 overflow-y-auto">
                            <template x-for="cat in availableCategories" :key="cat.id">
                              <button
                                @click="addMenuItem('category', cat.label, '', cat.id)"
                                class="block w-full text-left px-2 py-1.5 text-xs rounded hover:bg-[var(--ds-bg-hover)] truncate"
                                x-text="cat.label"
                              ></button>
                            </template>
                            <template x-if="!availableCategories.length">
                              <p class="text-xs text-[var(--ds-text-placeholder)] px-2">
                                カテゴリなし
                              </p>
                            </template>
                          </div>
                        </details>
                        <details class="border border-[var(--ds-border-default)] rounded-md">
                          <summary
                            class="px-3 py-2 text-xs font-semibold text-[var(--ds-text-muted)] bg-[var(--ds-bg-surface)] rounded-t-md"
                          >
                            カスタムリンク
                          </summary>
                          <div class="p-2">
                            <button
                              @click="addMenuItem('custom', '', '', '')"
                              class="gh-btn-outline text-xs w-full"
                            >
                              + 追加
                            </button>
                          </div>
                        </details>
                      </div>
                    </template>
                  </div>
                  <div class="p-3 border-t border-[var(--ds-border-default)]">
                    <button @click="addMenu()" class="gh-btn-green text-xs w-full">
                      <i data-lucide="plus" class="w-3 h-3"></i>
                      新規メニュー
                    </button>
                  </div>
                </div>

                <!-- 右: メニューエディタ -->
                <div class="flex-1 overflow-y-auto">
                  <template x-if="currentMenu">
                    <div class="px-8 py-0">
                      <div class="gh-editor-header">
                        <h2
                          class="text-sm font-bold"
                          x-text="currentMenu.name || '新規メニュー'"
                        ></h2>
                        <div class="flex-1"></div>
                        <button
                          @click="deleteMenu()"
                          class="text-[var(--ds-danger-600)] text-xs hover:underline mr-2"
                        >
                          削除
                        </button>
                        <button @click="saveMenus()" class="gh-btn-green text-[13px]">保存</button>
                      </div>

                      <div class="space-y-4">
                        <div>
                          <label class="gh-label">メニュー名</label>
                          <input
                            type="text"
                            x-model="currentMenu.name"
                            class="gh-input-light w-full text-sm"
                          />
                        </div>

                        <div>
                          <h3 class="text-sm font-bold mb-2">メニュー構造</h3>
                          <p class="text-xs text-[var(--ds-text-placeholder)] mb-3">
                            ドラッグまたは矢印ボタンで並び替え。
                          </p>

                          <div
                            class="space-y-2 min-h-[120px]"
                            x-data="{ dragIdx: null, dropIdx: null }"

                              <div
                                class="border rounded-md bg-[var(--ds-bg-surface)] transition-all"
                                :class="{ 'opacity-50': dragIdx === idx, 'border-[var(--ds-primary-600)] border-t-2': dropIdx === idx && dragIdx !== idx, 'border-[var(--ds-border-default)]': dropIdx !== idx || dragIdx === idx }"
                                :style="'margin-left:' + (item.parent ? '32px' : '0')"
                                draggable="true"
                                @dragstart="dragIdx = idx; $event.dataTransfer.effectAllowed = 'move'"
                                @dragover.prevent="dropIdx = idx; $event.dataTransfer.dropEffect = 'move'"
                                @dragleave="if(dropIdx === idx) dropIdx = null"
                                @drop.prevent="if(dragIdx !== null && dragIdx !== idx){ currentMenu.items.splice(idx, 0, currentMenu.items.splice(dragIdx, 1)[0]) }; dragIdx = null; dropIdx = null"
                                @dragend="dragIdx = null; dropIdx = null"
                              >
                                <div class="px-3 py-3 space-y-2">

                                          data-lucide="chevron-up"
                                          class="w-3.5 h-3.5 pointer-events-none"
                                        ></i>

                                      <button

                                        :disabled="idx === currentMenu.items.length - 1"
                                        class="p-1 text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] disabled:opacity-30 disabled:cursor-not-allowed"
                                      >
                                        <i
                                          data-lucide="chevron-down"
                                          class="w-3.5 h-3.5 pointer-events-none"
                                        ></i>
                                      </button>
                                    </div>
                                    <input
                                      type="text"
                                      x-model="item.label"
                                      placeholder="ラベル"
                                      class="gh-input-light text-sm flex-1"
                                    />
                                    <button
                                      @click="removeMenuItem(idx)"
                                      class="text-[var(--ds-danger-600)] text-xs hover:underline shrink-0 px-2 py-1.5 -mr-2 rounded hover:bg-red-50"

                                      削除
                                    </button>

                                      class="text-xs text-[var(--ds-text-muted)] bg-[var(--ds-bg-hover)] px-1.5 py-0.5 rounded"

                                        class="gh-input-light text-xs flex-1"
                                      />
                                      <label
                                        class="flex items-center gap-1.5 text-xs text-[var(--ds-text-muted)] shrink-0"
                                      >
                                        <input
                                          type="checkbox"
                                          :checked="item.target === '_blank'"

                                          class="accent-[var(--ds-primary-600)]"
                                        />
                                        新しいタブ
                                      </label>
                                    </div>
                                  </template>
                                </div>
                              </div>
                            </template>
                            <template x-if="!currentMenu.items.length">
                              <div
                                class="py-12 text-center text-sm text-[var(--ds-text-placeholder)] border border-dashed border-[var(--ds-border-default)] rounded-md"
                              >
                                左のパネルから項目を追加してください
                              </div>
                            </template>
                          </div>
                        </div>

                            ></pre>
                            <span
                              class="absolute top-2 right-2 text-[var(--ds-text-muted)] opacity-0 group-hover:opacity-100 transition-opacity text-xs"
                            >
                              クリックでコピー
                            </span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                  <template x-if="!currentMenu">
                    <div class="flex-1 flex items-center justify-center h-full">
                      <p class="text-sm text-[var(--ds-text-muted)]">
                        メニューを選択または新規作成
                      </p>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- カテゴリ管理 -->

                <div class="px-8 py-0">
                  <div class="gh-editor-header">
                    <h2 class="text-sm font-bold">カテゴリ</h2>
                    <div class="flex-1"></div>
                    <button @click="saveTaxonomies()" class="gh-btn-green text-[13px]">保存</button>
                  </div>

                    記事に割り当てるカテゴリを管理します。スラッグはURLに使用されます。

                  <div class="space-y-2">

                                    showSampleMenu = false;
                                    $nextTick(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = pos + sample.length });

                          @click="siteConfig.theme = {...(siteConfig.theme||{}), fontId: f.id}"
                          class="px-3 py-2 rounded-md border text-sm transition-all"
                          :class="(siteConfig.theme?.fontId || 'system') === f.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-600)]/5 font-semibold' : 'border-[var(--ds-border-default)] hover:border-[var(--ds-border-strong)]'"
                        >
                          <span x-text="f.label"></span>
                        </button>
                      </template>
                    </div>
                  </div>

                  <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">
                    外部サービス連携
                  </h2>

                  <!-- フォームバックエンド -->
                  <div>
                    <label class="gh-label">フォームバックエンド</label>
                    <div class="flex gap-2 mb-2">
                      <template
                        x-for="fb in [{id:'formrun',label:'Formrun'},{id:'web3forms',label:'Web3Forms'},{id:'gas',label:'GAS'},{id:'custom',label:'独自'}]"
                        :key="fb.id"
                      >
                        <button
                          @click="siteConfig.services = {...(siteConfig.services||{}), formBackend: fb.id}"
                          class="px-3 py-1.5 rounded-md border text-xs transition-all"
                          :class="(siteConfig.services?.formBackend || '') === fb.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-600)]/5 font-semibold' : 'border-[var(--ds-border-default)] hover:border-[var(--ds-border-strong)]'"
                          x-text="fb.label"
                        ></button>
                      </template>
                    </div>
                    <input
                      type="url"
                      x-model="siteConfig.services.formUrl"
                      placeholder="フォーム送信先URL"
                      class="gh-input-light w-full"
                    />
                  </div>

                  <!-- 自動翻訳 -->
                  <div>
                    <label class="gh-label">自動翻訳API</label>
                    <div class="flex gap-2 mb-2">
                      <template
                        x-for="tr in [{id:'none',label:'なし'},{id:'deepl',label:'DeepL'},{id:'google',label:'Google翻訳'}]"
                        :key="tr.id"
                      >
                        <button
                          @click="siteConfig.services = {...(siteConfig.services||{}), translator: tr.id}"
                          class="px-3 py-1.5 rounded-md border text-xs transition-all"
                          :class="(siteConfig.services?.translator || 'none') === tr.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-600)]/5 font-semibold' : 'border-[var(--ds-border-default)] hover:border-[var(--ds-border-strong)]'"
                          x-text="tr.label"
                        ></button>
                      </template>
                    </div>
                    <template
                      x-if="siteConfig.services?.translator && siteConfig.services.translator !== 'none'"
                    >
                      <input
                        type="text"
                        x-model="siteConfig.services.translatorApiKey"
                        placeholder="APIキー"
                        class="gh-input-light w-full"
                      />
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- 設定（CMS自体の動作に関わる設定。site.json には保存されない） -->
            <template x-if="view === 'settings'">
              <div class="px-8 py-0 max-w-5xl mx-auto">
                <div class="gh-editor-header">
                  <h1 class="text-lg font-bold">設定</h1>
                </div>
                <p class="text-xs text-[var(--ds-text-muted)] mb-6">
                  この画面は ONE CMS
                  自体の動作設定です。サイトに関する情報（サイト名・カラーテーマ・外部サービス連携など）はサイドバーの「サイト情報」から編集してください。
                </p>
                <div class="space-y-5">
                  <h2 class="text-base font-bold text-[var(--ds-text-heading)]">表示</h2>

                  <!-- 管理画面テーマ（light/dark/system） -->
                  <div>
                    <label class="gh-label">管理画面テーマ</label>
                    <div class="flex gap-2 flex-wrap">
                      <template
                        x-for="mode in [
                          {id:'light',label:'ライト',icon:'sun'},
                          {id:'dark',label:'ダーク',icon:'moon'},
                          {id:'system',label:'システム連動',icon:'monitor'}
                        ]"
                        :key="mode.id"
                      >
                        <button
                          @click="setThemeMode(mode.id)"
                          class="flex items-center gap-2 px-3 py-2 rounded-md border text-sm transition-all"
                          :class="themeMode === mode.id ? 'border-[var(--ds-primary-600)] bg-[var(--ds-primary-100)] text-[var(--ds-primary-600)] font-semibold' : 'border-[var(--ds-border-default)] text-[var(--ds-text-body)] hover:border-[var(--ds-border-strong)]'"
                        >
                          <i :data-lucide="mode.icon" class="w-4 h-4"></i>
                          <span x-text="mode.label"></span>
                        </button>
                      </template>
                    </div>
                    <p class="text-[11px] text-[var(--ds-text-muted)] mt-1">
                      ブラウザ単位の設定です。同じユーザーでも別の PC・ブラウザでは個別に設定します
                    </p>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </main>

        <!-- リビジョンパネル -->
        <aside
          x-show="showRevisionPanel"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="translate-x-full"
          class="w-80 bg-[var(--ds-bg-surface)] text-[var(--ds-text-heading)] border-l border-[var(--ds-border-default)] flex flex-col overflow-hidden"
        >
          <div
            class="flex items-center justify-between px-4 h-[52px] border-b border-[var(--ds-border-default)] shrink-0 relative z-10"
          >
            <span class="text-sm font-semibold">履歴</span>
            <button
              @click.stop="closePanel()"
              class="w-8 h-8 flex items-center justify-center text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] rounded hover:bg-[var(--ds-bg-hover)]"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="flex-1 overflow-y-auto">
            <template x-for="(rev, idx) in revisions" :key="rev.filename">
              <button
                @click="selectRevision(rev)"
                :class="selectedRevision?.filename === rev.filename ? 'bg-[var(--ds-bg-hover)]' : 'hover:bg-[var(--ds-bg-muted)]'"
                class="w-full text-left px-4 py-3 text-sm border-b border-[var(--ds-border-default)]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-xs font-medium" x-text="rev.timestamp.replace('_', ' ')"></span>
                  <template x-if="idx === 0">
                    <span
                      class="gh-badge bg-[var(--ds-primary-600)]/10 text-[var(--ds-primary-600)]"
                    >
                      最新
                    </span>
                  </template>
                </div>
                <p class="text-[var(--ds-text-muted)] text-xs mt-0.5" x-text="rev.author"></p>
              </button>
            </template>
            <template x-if="revisions.length === 0">
              <div class="px-4 py-10 text-center text-xs text-[var(--ds-text-placeholder)]">
                履歴がありません
              </div>
            </template>
            <template x-if="revisionDiff">
              <div class="p-4 border-t border-[var(--ds-border-default)]">
                <p class="text-xs font-semibold text-[var(--ds-text-muted)] mb-2">変更内容</p>
                <div
                  class="text-xs bg-[var(--ds-bg-muted)] rounded p-2 revision-diff overflow-auto max-h-48"
                  x-html="revisionDiff"
                ></div>
                <button @click="restoreRevision()" class="mt-3 w-full ds-btn-danger text-xs">
                  この版に戻す
                </button>
              </div>
            </template>
          </div>
        </aside>

        <!-- プレビューパネル -->
        <aside
          x-show="showPreviewPanel"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="translate-x-full"
          class="w-[480px] bg-[var(--ds-bg-surface)] border-l border-[var(--ds-border-default)] flex flex-col overflow-hidden"
        >
          <div
            class="flex items-center justify-between px-4 h-[52px] border-b border-[var(--ds-border-default)] shrink-0 relative z-10"
          >
            <span class="text-sm font-semibold text-[var(--ds-text-heading)]">プレビュー</span>
            <button
              @click.stop="closePanel()"
              class="w-8 h-8 flex items-center justify-center text-[var(--ds-text-muted)] hover:text-[var(--ds-text-heading)] rounded hover:bg-[var(--ds-bg-hover)]"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="flex-1 overflow-hidden relative">
            <iframe
              :srcdoc="previewHtml"
              class="w-full h-full border-0"
              sandbox="allow-same-origin"
            ></iframe>
          </div>
        </aside>
      </div>
    </template>

    <!-- ページ作成モーダル -->
    <div
      x-show="showPageCreator"
      class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
      @click.self="showPageCreator=false"
    >
      <div
        class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-sm p-6 text-[var(--ds-text-heading)]"
      >
        <h2 class="text-lg font-bold mb-4">新規ページ</h2>
        <div class="space-y-3">
          <div>
            <label class="gh-label">ページタイトル</label>
            <input
              type="text"
              x-model="editingPageTitle"
              class="gh-input-light w-full"
              placeholder="お問い合わせ"
              @keydown.enter="confirmCreatePage()"
              autofocus
            />
          </div>
          <div>
            <label class="gh-label">ページID（URL用）</label>
            <input
              type="text"
              x-model="editingPageId"
              class="gh-input-light w-full"
              placeholder="contact（空欄ならタイトルから自動生成）"
            />
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
          <button @click="showPageCreator=false" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="confirmCreatePage()" class="gh-btn-green text-xs">作成</button>
        </div>
      </div>
    </div>

    <!-- ページ設定モーダル -->
    <template x-if="showPagesConfigEditor && editingPagesConfig">
      <div
        class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
        @click.self="showPagesConfigEditor=false; editingPagesConfig=null"
      >
        <div
          class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-lg max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
        >
          <h2 class="text-lg font-bold mb-4">ページ設定</h2>
          <div class="space-y-4">
            <div>
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingPagesConfig.hasBody"
                  class="accent-[var(--ds-primary-600)]"
                />
                本文エディタを表示
              </label>
              <p class="text-[10px] text-[var(--ds-text-muted)] mt-0.5 ml-6">
                すべてのページでEditor.jsの本文エディタを有効にします
              </p>
            </div>
            <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
            <h3 class="text-sm font-bold mb-2">フィールドグループ</h3>
            <template x-if="fieldGroups.length">
              <div class="space-y-1">
                <template x-for="g in fieldGroups" :key="g.id">
                  <label
                    class="flex items-center gap-2 px-2 py-1.5 rounded hover:bg-[var(--ds-bg-hover)] cursor-pointer text-xs"
                  >
                    <input
                      type="checkbox"
                      :value="g.id"
                      :checked="(editingPagesConfig.fieldGroupIds || []).includes(g.id)"
                      @change="
                        if (!editingPagesConfig.fieldGroupIds) editingPagesConfig.fieldGroupIds = [];
                        if ($event.target.checked) {
                          editingPagesConfig.fieldGroupIds.push(g.id);
                        } else {
                          editingPagesConfig.fieldGroupIds = editingPagesConfig.fieldGroupIds.filter(id => id !== g.id);
                        }
                      "
                      class="accent-[var(--ds-primary-600)]"
                    />
                    <span x-text="g.label"></span>
                    <span
                      class="text-[var(--ds-text-muted)] ml-auto"
                      x-text="g.fields.length + ' フィールド'"
                    ></span>
                  </label>
                </template>
              </div>
            </template>
            <template x-if="!fieldGroups.length">
              <p class="text-xs text-[var(--ds-text-muted)]">
                フィールドグループがありません。サイドバーの「フィールド」から作成してください。
              </p>
            </template>
          </div>
          <div class="flex justify-end gap-2 mt-6">
            <button
              @click="showPagesConfigEditor=false; editingPagesConfig=null"
              class="gh-btn-outline text-xs"
            >
              キャンセル
            </button>
            <button @click="savePagesConfig()" class="gh-btn-green text-xs">保存</button>
          </div>
        </div>
      </div>
    </template>

    <!-- コンテンツタイプ編集モーダル -->
    <template x-if="showTypeEditor && editingType">
      <div
        class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
        @click.self="showTypeEditor=false; editingType=null"
      >
        <div
          class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-2xl max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
        >
          <h2
            class="text-lg font-bold mb-4"
            x-text="editingType.id ? 'コンテンツタイプ編集' : '新規コンテンツタイプ'"
          ></h2>
          <div class="space-y-3">
            <div>
              <label class="gh-label">ラベル</label>
              <input type="text" x-model="editingType.label" class="gh-input-light w-full" />
            </div>
            <div>
              <label class="gh-label">スラッグ (URL用)</label>
              <input
                type="text"
                x-model="editingType.slug"
                class="gh-input-light w-full"
                placeholder="news"
              />
            </div>
            <div>
              <label class="gh-label">1ページあたりの件数</label>
              <input type="number" x-model="editingType.pagination" class="gh-input-light w-24" />
            </div>
            <div class="flex flex-wrap gap-4 mt-1">
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasBody"
                  class="accent-[var(--ds-primary-600)]"
                />
                本文
              </label>
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasDate"
                  class="accent-[var(--ds-primary-600)]"
                />
                投稿日
              </label>
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasThumbnail"
                  class="accent-[var(--ds-primary-600)]"
                />
                サムネイル
              </label>
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasCategory"
                  class="accent-[var(--ds-primary-600)]"
                />
                カテゴリ
              </label>
              <label class="flex items-center gap-1.5 text-xs cursor-pointer">
                <input
                  type="checkbox"
                  x-model="editingType.hasTag"
                  class="accent-[var(--ds-primary-600)]"
                />
                タグ
              </label>
            </div>
            <div class="h-px bg-[var(--ds-border-default)] my-2"></div>
            <h3 class="text-sm font-bold mb-2">フィールドグループ</h3>
            <template x-if="fieldGroups.length">
              <div class="space-y-1">
                <template x-for="g in fieldGroups" :key="g.id">
                  <label
                    class="flex items-center gap-2 px-2 py-1.5 rounded hover:bg-[var(--ds-bg-hover)] cursor-pointer text-xs"
                  >
                    <input
                      type="checkbox"
                      :value="g.id"
                      :checked="(editingType?.fieldGroupIds || []).includes(g.id)"
                      @change="
                        if (!editingType.fieldGroupIds) editingType.fieldGroupIds = [];
                        if ($event.target.checked) {
                          editingType.fieldGroupIds.push(g.id);
                        } else {
                          editingType.fieldGroupIds = editingType.fieldGroupIds.filter(id => id !== g.id);
                        }
                      "
                      class="accent-[var(--ds-primary-600)]"
                    />
                    <span x-text="g.label"></span>
                    <span
                      class="text-[var(--ds-text-muted)] ml-auto"
                      x-text="g.fields.length + ' フィールド'"
                    ></span>
                  </label>
                </template>
              </div>
            </template>
            <template x-if="!fieldGroups.length">
              <p class="text-xs text-[var(--ds-text-muted)]">
                フィールドグループがありません。サイドバーの「フィールド」から作成してください。
              </p>
            </template>
          </div>

          <div class="flex justify-between mt-6">
            <button
              x-show="editingType?.id"
              @click="deleteType()"
              class="text-[var(--ds-danger-600)] text-xs hover:underline"
            >
              削除
            </button>
            <div class="flex gap-2 ml-auto">
              <button
                @click="showTypeEditor=false; editingType=null"
                class="gh-btn-outline text-xs"
              >
                キャンセル
              </button>
              <button @click="saveType()" class="gh-btn-green text-xs">保存</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- タクソノミー管理モーダル（廃止 → ビュー化済み） -->

    <!-- 言語設定モーダル -->
    <div
      x-show="showLangEditor"
      class="fixed inset-0 bg-[var(--ds-bg-overlay)] flex items-center justify-center z-50"
      @click.self="showLangEditor=false"
    >
      <div
        class="bg-[var(--ds-bg-surface)] rounded-lg shadow-xl w-full max-w-md max-h-[80vh] overflow-y-auto p-6 text-[var(--ds-text-heading)]"
      >
        <h2 class="text-lg font-bold mb-4">言語設定</h2>
        <div class="mb-3">
          <label class="gh-label">デフォルト言語コード</label>
          <input
            type="text"
            x-model="langEditorData.default"
            class="gh-input-light w-24"
            placeholder="ja"
          />
        </div>
        <h3 class="text-sm font-bold mb-2">言語一覧</h3>
        <div class="space-y-2 mb-3">
          <template x-for="(loc, idx) in langEditorData.locales" :key="loc.code || idx">
            <div class="flex gap-2 items-center">
              <input
                type="text"
                x-model="loc.code"
                class="gh-input-light w-16 text-xs"
                placeholder="ja"
              />
              <input
                type="text"
                x-model="loc.label"
                class="gh-input-light flex-1 text-xs"
                placeholder="日本語"
              />
              <input
                type="text"
                x-model="loc.flag"
                class="gh-input-light w-12 text-xs text-center"
                placeholder="🇯🇵"
              />
              <button @click="removeLangLocale(idx)" class="text-[var(--ds-danger-600)] text-xs">
                削除
              </button>
            </div>
          </template>
          <button @click="addLangLocale()" class="gh-btn-outline text-xs">+ 言語追加</button>
        </div>
        <div class="flex justify-end gap-2 mt-4">
          <button @click="showLangEditor=false" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="saveLangConfig()" class="gh-btn-green text-xs">保存</button>
        </div>
      </div>
    </div>

    <!-- トースト -->
    <div x-show="toast" x-transition.opacity class="ds-toast" x-text="toast"></div>

    <!-- カスタムモーダル（confirm/prompt代替） -->
    <div x-show="modalVisible" class="ds-modal-overlay" @keydown.escape.window="modalCancel()">
      <div class="ds-modal p-6" @click.stop>
        <h3 class="text-base font-bold mb-3 text-[var(--ds-text-heading)]" x-text="modalTitle"></h3>
        <p
          x-show="modalMessage"
          class="text-sm text-[var(--ds-text-muted)] mb-4"
          x-text="modalMessage"
        ></p>
        <input
          x-show="modalShowInput"
          type="text"
          x-model="modalInput"
          @keydown.enter="modalOk()"
          class="gh-input-light w-full mb-4"
          x-ref="modalInputRef"
        />
        <div class="flex justify-end gap-2">
          <button @click="modalCancel()" class="gh-btn-outline text-xs">キャンセル</button>
          <button @click="modalOk()" class="gh-btn-green text-xs">OK</button>
        </div>
      </div>
    </div>

    <!-- ローディング -->
    <div x-show="exporting" class="ds-modal-overlay">
      <div class="ds-modal p-8 text-center">
        <div
          class="animate-spin w-6 h-6 border-2 border-[var(--ds-primary-600)] border-t-transparent rounded-full mx-auto mb-3"
        ></div>
        <p class="text-sm text-[var(--ds-text-muted)]">書き出し中...</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
